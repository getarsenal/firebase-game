// EFFECTS
// ═══════════════════════════════════════════════════
function addFx(fx,fy,color,life) { effects.push({fx,fy,color,life,maxLife:life}); }
function render() {
  ctx.clearRect(0,0,W,H);
  const offX=W/2-camFx*mapNatW*camZ;
  const offY=HUD_H+(H-HUD_H)/2-camFy*mapNatH*camZ;
  ctx.save();
  ctx.translate(offX,offY);
  ctx.scale(camZ,camZ);

  // Map
  if (mapImg) {
    ctx.drawImage(mapImg,0,0,mapNatW,mapNatH);
    ctx.fillStyle='rgba(8,10,4,.18)';
    ctx.fillRect(0,0,mapNatW,mapNatH);
  } else {
    ctx.fillStyle='#1a1c10';
    ctx.fillRect(0,0,mapNatW,mapNatH);
  }

  drawPath();
  drawGunSlots();
  if (showRanges) drawRangeRings();
  drawFortifications();
  drawPlacedGuns();
  drawCrew();
  drawCFShots();
  drawBossRockets();
  drawBackblasts();
  drawProjectiles();
  drawEnemies();
  drawEffects();
  drawFOBMarker();
  drawSpawnMarker();
  drawFireMission();
  if (routeEditMode) drawRouteEditor();

  ctx.restore();
  requestAnimationFrame(()=>{ update(); render(); });
}

// nat-px helpers
function nx(fx){return fx*mapNatW;}
function ny(fy){return fy*mapNatH;}
function np(fx,fy){return[fx*mapNatW,fy*mapNatH];}
function lw(px){return Math.max(.4,px/camZ);}
function rs(r){return r/camZ;}

// ─── PATH ───
function drawPath() {
  ctx.lineCap='round'; ctx.lineJoin='round';

  // Smooth path using midpoint-quadratic-bezier (Catmull-Rom style)
  // Each segment curves through the waypoint rather than cornering at it
  function smoothPathStroke() {
    ctx.beginPath();
    const pts = PATH_FRACS;
    ctx.moveTo(nx(pts[0][0]), ny(pts[0][1]));
    for (let i=0; i<pts.length-1; i++) {
      const x0=nx(pts[i][0]),   y0=ny(pts[i][1]);
      const x1=nx(pts[i+1][0]), y1=ny(pts[i+1][1]);
      // Control point: the current waypoint
      // Draw to midpoint of this segment and next
      if (i < pts.length-2) {
        const mx = (x1 + nx(pts[i+2][0])) / 2;
        const my = (y1 + ny(pts[i+2][1])) / 2;
        ctx.quadraticCurveTo(x1, y1, mx, my);
      } else {
        ctx.lineTo(x1, y1);
      }
    }
    ctx.stroke();
  }

  // Glow halo
  ctx.strokeStyle='rgba(220,65,18,.10)'; ctx.lineWidth=lw(32);
  smoothPathStroke();
  // Core road line
  ctx.strokeStyle='rgba(210,60,18,.40)'; ctx.lineWidth=lw(7);
  smoothPathStroke();
  // Centre highlight
  ctx.strokeStyle='rgba(240,80,30,.15)'; ctx.lineWidth=lw(2);
  smoothPathStroke();
}

// ─── GUN SLOTS ───
function drawGunSlots() {
  const r=Math.max(5,rs(14));
  for (const s of gunSlots) {
    if (s.occupied) continue;
    const[x,y]=np(s.fx,s.fy);
    ctx.fillStyle='rgba(8,12,4,.68)';
    ctx.beginPath();ctx.arc(x,y,r*1.9,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=waveActive?'rgba(55,70,28,.5)':'rgba(130,195,55,.88)';
    ctx.lineWidth=lw(1.8);
    ctx.setLineDash([lw(3.5),lw(4)]);
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.stroke();
    ctx.setLineDash([]);
    if (!waveActive) {
      ctx.fillStyle='rgba(150,225,65,.72)';
      ctx.beginPath();ctx.arc(x,y,Math.max(1.5,rs(4.5)),0,Math.PI*2);ctx.fill();
    }
  }
}

// ─── RANGE FANS ───
function drawRangeRings() {
  for (const gun of placedGuns) {
    const [x, y] = np(gun.fx, gun.fy);
    const r = gun.rangePx;

    // Full range circle — bright cyan outline, no fill
    ctx.strokeStyle = 'rgba(0,230,255,0.55)';
    ctx.lineWidth   = lw(2);
    ctx.setLineDash([lw(5), lw(7)]);
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);

    // Filled sector in aim direction (±50°)
    const spread = Math.PI * 50 / 180;
    const a0 = gun.angle - spread;
    const a1 = gun.angle + spread;
    ctx.fillStyle   = 'rgba(0,230,255,0.12)';
    ctx.strokeStyle = 'rgba(0,230,255,0.45)';
    ctx.lineWidth   = lw(1.2);
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.arc(x, y, r, a0, a1);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Range tick at barrel tip
    const tx = x + Math.cos(gun.angle) * r;
    const ty = y + Math.sin(gun.angle) * r;
    ctx.strokeStyle = 'rgba(0,230,255,0.75)';
    ctx.lineWidth   = lw(2);
    const tickLen = lw(10);
    ctx.beginPath();
    ctx.moveTo(tx - Math.sin(gun.angle) * tickLen, ty + Math.cos(gun.angle) * tickLen);
    ctx.lineTo(tx + Math.sin(gun.angle) * tickLen, ty - Math.cos(gun.angle) * tickLen);
    ctx.stroke();
  }
}

// ─── FORTIFICATIONS ───
// Walls are drawn as tight solid arcs flush with the gun icon.
// Opening faces the REAR of the gun (gun.angle + PI = behind the barrel).
function drawFortifications() {
  for (const gun of placedGuns) {
    if (!gun.digLevel && !gun.isDigging) continue;

    const [x, y]  = np(gun.fx, gun.fy);
    const sz      = gun.iconSz;

    // Gap centered on the REAR of the gun
    const rearAng  = gun.angle + Math.PI;
    const gapHalf  = 0.42;   // ~24° each side — clear entry/exit gap
    const arcStart = rearAng + gapHalf;
    const arcSpan  = Math.PI * 2 - gapHalf * 2;   // ~314° of coverage

    const buildingLevel = gun.isDigging ? gun.digLevel : -1;
    const progress      = gun.isDigging ? 1 - gun.digTimer / DIG_STAGES[gun.digLevel].frames : 1;
    const drawArcSpan   = (lvl) => lvl === buildingLevel ? arcSpan * progress : arcSpan;

    // ─── LEVEL 1: Scraped dirt berm ───────────────────────────────────────
    if (gun.digLevel >= 1 || buildingLevel === 0) {
      const alpha = buildingLevel === 0 ? Math.max(0.1, progress) : 1;
      const r1    = sz * 0.68;
      const span  = drawArcSpan(0);

      // Outer raised earth — wider stroke, darker
      ctx.strokeStyle = `rgba(72,54,28,${0.80 * alpha})`;
      ctx.lineWidth   = Math.max(2.5, sz * 0.22 / camZ);
      ctx.lineCap     = 'butt';
      ctx.beginPath();
      ctx.arc(x, y, r1, arcStart, arcStart + span);
      ctx.stroke();

      // Inner bright earth — slightly narrower, lighter
      ctx.strokeStyle = `rgba(110,84,42,${0.70 * alpha})`;
      ctx.lineWidth   = Math.max(1.5, sz * 0.12 / camZ);
      ctx.beginPath();
      ctx.arc(x, y, r1, arcStart, arcStart + span);
      ctx.stroke();

      // Scoop marks — radial ticks showing disturbed earth
      if (alpha > 0.4) {
        ctx.strokeStyle = `rgba(58,42,20,${0.5 * alpha})`;
        ctx.lineWidth   = lw(0.8);
        ctx.lineCap     = 'round';
        const ticks = 10;
        for (let i = 0; i < ticks; i++) {
          const a  = arcStart + (i / (ticks - 1)) * span;
          const ir = r1 - sz * 0.12;
          const or = r1 + sz * 0.10;
          ctx.beginPath();
          ctx.moveTo(x + Math.cos(a) * ir, y + Math.sin(a) * ir);
          ctx.lineTo(x + Math.cos(a) * or, y + Math.sin(a) * or);
          ctx.stroke();
        }
      }
    }

    // ─── LEVEL 2: Sandbag wall ────────────────────────────────────────────
    if (gun.digLevel >= 2 || buildingLevel === 1) {
      const alpha = buildingLevel === 1 ? Math.max(0.1, progress) : 1;
      const r2    = sz * 0.78;                      // sits just outside dirt berm
      const wallW = Math.max(3, sz * 0.28 / camZ);  // wall thickness (bag height × 2 rows)
      const span  = drawArcSpan(1);

      // ── Back fill: dark shadow inside the wall ──
      ctx.strokeStyle = `rgba(50,38,18,${0.6 * alpha})`;
      ctx.lineWidth   = wallW * 1.15;
      ctx.lineCap     = 'butt';
      ctx.beginPath();
      ctx.arc(x, y, r2, arcStart, arcStart + span);
      ctx.stroke();

      // ── Main sandbag fill ──
      ctx.strokeStyle = `rgba(148,118,56,${0.92 * alpha})`;
      ctx.lineWidth   = wallW;
      ctx.beginPath();
      ctx.arc(x, y, r2, arcStart, arcStart + span);
      ctx.stroke();

      // ── Top highlight (lighter top face) ──
      ctx.strokeStyle = `rgba(180,148,76,${0.50 * alpha})`;
      ctx.lineWidth   = Math.max(1, sz * 0.05 / camZ);
      ctx.beginPath();
      ctx.arc(x, y, r2 + wallW * 0.35, arcStart, arcStart + span);
      ctx.stroke();

      // ── Bag seam lines — perpendicular ticks along the wall ──
      // Two rows: offset by half-bag width
      const bagArcW = sz * 0.20 / r2;  // angular width of one bag
      ctx.strokeStyle = `rgba(88,68,28,${0.55 * alpha})`;
      ctx.lineWidth   = lw(0.7);
      ctx.lineCap     = 'round';

      for (let row = 0; row < 2; row++) {
        const rowOffset = row * bagArcW * 0.5;   // offset every other row
        let a = arcStart + rowOffset;
        while (a < arcStart + span - bagArcW * 0.3) {
          // Seam line: radial line through the wall
          const inner = r2 - wallW * 0.5;
          const outer = r2 + wallW * 0.5;
          ctx.beginPath();
          ctx.moveTo(x + Math.cos(a) * inner, y + Math.sin(a) * inner);
          ctx.lineTo(x + Math.cos(a) * outer, y + Math.sin(a) * outer);
          ctx.stroke();
          // Bag body indent (small arc along middle)
          const midA = a + bagArcW * 0.5;
          if (midA < arcStart + span) {
            ctx.strokeStyle = `rgba(120,92,40,${0.30 * alpha})`;
            ctx.lineWidth   = lw(0.5);
            ctx.beginPath();
            ctx.arc(x, y, r2, a + bagArcW * 0.1, midA);
            ctx.stroke();
            ctx.strokeStyle = `rgba(88,68,28,${0.55 * alpha})`;
            ctx.lineWidth   = lw(0.7);
          }
          a += bagArcW;
        }
      }
    }

    // ─── LEVEL 3: Hardened concrete/timber parapet ────────────────────────
    if (gun.digLevel >= 3 || buildingLevel === 2) {
      const alpha  = buildingLevel === 2 ? Math.max(0.1, progress) : 1;
      const r3     = sz * 0.90;                      // outermost ring
      const wallW3 = Math.max(4, sz * 0.34 / camZ);  // thicker than sandbags
      const span   = drawArcSpan(2);
      const blockArcW = sz * 0.26 / r3;              // angular width of one block

      // ── Back shadow ──
      ctx.strokeStyle = `rgba(30,28,24,${0.65 * alpha})`;
      ctx.lineWidth   = wallW3 * 1.12;
      ctx.lineCap     = 'butt';
      ctx.beginPath();
      ctx.arc(x, y, r3, arcStart, arcStart + span);
      ctx.stroke();

      // ── Block body — alternating colours ──
      let a = arcStart;
      let blockIdx = 0;
      while (a < arcStart + span) {
        const blockEnd = Math.min(a + blockArcW, arcStart + span);
        ctx.strokeStyle = blockIdx % 2 === 0
          ? `rgba(82,78,68,${0.92 * alpha})`
          : `rgba(68,64,55,${0.92 * alpha})`;
        ctx.lineWidth   = wallW3;
        ctx.lineCap     = 'butt';
        ctx.beginPath();
        ctx.arc(x, y, r3, a + 0.008, blockEnd - 0.008);  // tiny gap = mortar joint
        ctx.stroke();
        a += blockArcW;
        blockIdx++;
      }

      // ── Top highlight — concrete cap ──
      ctx.strokeStyle = `rgba(110,105,90,${0.55 * alpha})`;
      ctx.lineWidth   = Math.max(1.2, sz * 0.06 / camZ);
      ctx.lineCap     = 'butt';
      ctx.beginPath();
      ctx.arc(x, y, r3 + wallW3 * 0.38, arcStart, arcStart + span);
      ctx.stroke();

      // ── Rebar/stress lines on each block face ──
      ctx.strokeStyle = `rgba(40,38,30,${0.35 * alpha})`;
      ctx.lineWidth   = lw(0.5);
      ctx.lineCap     = 'round';
      a = arcStart;
      while (a < arcStart + span) {
        const midA   = a + blockArcW * 0.5;
        const inner  = r3 - wallW3 * 0.48;
        const outer  = r3 + wallW3 * 0.48;
        // Vertical mortar joint
        ctx.beginPath();
        ctx.moveTo(x + Math.cos(a) * inner, y + Math.sin(a) * inner);
        ctx.lineTo(x + Math.cos(a) * outer, y + Math.sin(a) * outer);
        ctx.stroke();
        // Horizontal mid-line (block course)
        if (midA < arcStart + span) {
          ctx.beginPath();
          ctx.arc(x, y, r3, a + 0.01, Math.min(a + blockArcW - 0.01, arcStart + span));
          ctx.stroke();
        }
        a += blockArcW;
      }
    }

    // ─── Construction progress arc ────────────────────────────────────────
    if (gun.isDigging) {
      const elapsed = 1 - gun.digTimer / DIG_STAGES[gun.digLevel].frames;
      const sweepR  = sz * (1.12 + gun.digLevel * 0.14);
      ctx.strokeStyle = 'rgba(200,160,60,0.70)';
      ctx.lineWidth   = lw(2);
      ctx.lineCap     = 'round';
      ctx.beginPath();
      ctx.arc(x, y, sweepR, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * elapsed);
      ctx.stroke();
      if (camZ > 1.2) {
        ctx.fillStyle    = 'rgba(200,160,60,0.85)';
        ctx.font         = `bold ${Math.max(5, rs(9))}px Courier New`;
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText(`⛏ ${Math.ceil(gun.digTimer / 60)}s`, x, y - sweepR - rs(12));
      }
    }
  }
}

// ─── PLACED GUNS ───
function drawPlacedGuns() {
  for (const gun of placedGuns) {
    const def  = GUN_DEFS[gun.gunKey];
    const img  = images[def.mapKey];
    const sz   = gun.iconSz;                        // desired icon height in nat-px
    const recoilFrac = gun.recoilTimer / RECOIL_FRAMES;  // 1→0
    const recoilAmt  = recoilFrac * sz * 0.28;     // max recoil = 28% of icon height

    // Icon centre (shifted backward along barrel during recoil)
    const baseX = nx(gun.fx);
    const baseY = ny(gun.fy);
    const iconX = baseX - Math.cos(gun.angle) * recoilAmt;
    const iconY = baseY - Math.sin(gun.angle) * recoilAmt;

    ctx.save();
    ctx.translate(iconX, iconY);
    ctx.rotate(gun.angle + def.rotOffset);

    if (img) {
      // Preserve image aspect ratio — scale to fit iconSz height
      const ar   = img.naturalWidth / img.naturalHeight;
      const drawH = sz;
      const drawW = sz * ar;
      ctx.drawImage(img, -drawW / 2, -drawH / 2, drawW, drawH);
    } else {
      // Fallback circle
      ctx.fillStyle = def.shell;
      ctx.beginPath(); ctx.arc(0, 0, sz * 0.4, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();

    // ── MUZZLE FLASH ──
    if (gun.flashTimer > 0) {
      const flashFrac = gun.flashTimer / FLASH_FRAMES;  // 1→0
      // Barrel tip position (icon height/2 ahead along aim)
      const tipX = baseX + Math.cos(gun.angle) * (sz * 0.55 + recoilAmt);
      const tipY = baseY + Math.sin(gun.angle) * (sz * 0.55 + recoilAmt);
      const flashR = sz * 0.55 * flashFrac;

      // Outer glow
      ctx.globalAlpha = flashFrac * 0.55;
      ctx.fillStyle = '#fff8c0';
      ctx.beginPath(); ctx.arc(tipX, tipY, flashR * 1.6, 0, Math.PI * 2); ctx.fill();

      // Bright core
      ctx.globalAlpha = flashFrac * 0.9;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath(); ctx.arc(tipX, tipY, flashR * 0.65, 0, Math.PI * 2); ctx.fill();

      // Radial spokes
      ctx.globalAlpha = flashFrac * 0.6;
      ctx.strokeStyle = '#fff4a0';
      ctx.lineWidth = lw(1.5);
      for (let s = 0; s < 6; s++) {
        const a = (s / 6) * Math.PI * 2 + gun.angle;
        ctx.beginPath();
        ctx.moveTo(tipX, tipY);
        ctx.lineTo(tipX + Math.cos(a) * flashR * 2, tipY + Math.sin(a) * flashR * 2);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }

    // ── HP PIPS ──
    const pipR = Math.max(1.5, rs(3.5));
    const pipY = baseY + sz * 0.55 + rs(6);
    for (let i = 0; i < gun.maxHp; i++) {
      ctx.fillStyle = i < gun.hp ? '#5a9020' : '#4a1010';
      ctx.beginPath();
      ctx.arc(baseX - pipR * (gun.maxHp - 1) + i * pipR * 2.2, pipY, pipR, 0, Math.PI * 2);
      ctx.fill();
    }

    // ── RANK BADGE ──
    const rank = RANKS[gun.rankIdx || 0];
    if (gun.rankIdx > 0) {
      const fs = Math.max(5, rs(9));
      ctx.fillStyle = gun.rankIdx >= 6 ? '#ffd700' : gun.rankIdx >= 3 ? '#c8b870' : '#8a9860';
      ctx.font = `bold ${fs}px Courier New`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(rank.abbr, baseX, pipY + pipR * 2 + rs(2));
    }
  }
}

// ─── CREW ───
// Draws animated crew figures around towed guns (M119, M777)
// Animation is keyed to gun.reloadTimer phase within effectiveRof cycle
function drawCrew() {
  for (const gun of placedGuns) {
    const def = GUN_DEFS[gun.gunKey];
    if (!def.crewMax || !CREW_POSITIONS[gun.gunKey]) continue;

    const positions = CREW_POSITIONS[gun.gunKey];
    const sz  = gun.iconSz;
    const [gx, gy] = np(gun.fx, gun.fy);
    const eRof = Math.min(effectiveRof(gun), gun.rof * 4); // cap for display
    // phase: 0=just fired, 1=fully reloaded/ready
    const phase = eRof > 0 ? Math.max(0, 1 - gun.reloadTimer / eRof) : 1;

    for (let i = 0; i < positions.length; i++) {
      const m = gun.crew[i];
      if (!m || m.status === 'dead') {
        // Draw an X mark where crew was
        const pos = positions[i];
        const homeX = gx + (pos.ox * sz * Math.cos(gun.angle + def.rotOffset) - pos.oy * sz * Math.sin(gun.angle + def.rotOffset));
        const homeY = gy + (pos.ox * sz * Math.sin(gun.angle + def.rotOffset) + pos.oy * sz * Math.cos(gun.angle + def.rotOffset));
        ctx.strokeStyle = 'rgba(180,30,10,0.6)';
        ctx.lineWidth = lw(1.2);
        const cr = Math.max(1.5, rs(3));
        ctx.beginPath(); ctx.moveTo(homeX-cr,homeY-cr); ctx.lineTo(homeX+cr,homeY+cr); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(homeX+cr,homeY-cr); ctx.lineTo(homeX-cr,homeY+cr); ctx.stroke();
        continue;
      }

      // Animate crew position based on reload phase and role
      const pos = positions[i];
      let animOx = pos.ox, animOy = pos.oy;

      if (pos.role === 'loader' || (pos.role === 'asst' && i === 1)) {
        // Loader moves toward breech during load phase (phase 0.1–0.5)
        if (phase > 0.05 && phase < 0.55) {
          const t = Math.min(1, (phase - 0.05) / 0.3);
          const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t; // smooth step
          // Move toward breech (negative oy = toward barrel tip)
          animOy = pos.oy + (-0.15 - pos.oy) * ease;
          animOx = pos.ox * (1 - ease * 0.4);
        } else if (phase >= 0.55 && phase < 0.75) {
          // Return to home
          const t = (phase - 0.55) / 0.2;
          animOy = -0.15 + (pos.oy - (-0.15)) * t;
          animOx = pos.ox * (0.6 + 0.4 * t);
        }
      }

      if (pos.role === 'chief' && i === positions.length - 1) {
        // Chief moves to lanyard position just before firing (phase 0.8–1.0)
        if (phase > 0.80) {
          const t = (phase - 0.80) / 0.20;
          animOy = pos.oy - 0.30 * t;  // step forward slightly
        }
        // On fire (recoilTimer > 0): chief steps back
        if (gun.recoilTimer > 0) {
          animOy = pos.oy + 0.20;
        }
      }

      if (pos.role === 'gunner') {
        // Gunner stays near sights — slight lean toward gun during fire
        if (gun.flashTimer > 0) {
          animOx = pos.ox * 0.7;
        }
      }

      // Convert local offset to world coords (rotate with gun)
      const totalRot = gun.angle + def.rotOffset;
      const wx = gx + (animOx * sz * Math.cos(totalRot) - animOy * sz * Math.sin(totalRot));
      const wy = gy + (animOx * sz * Math.sin(totalRot) + animOy * sz * Math.cos(totalRot));

      // Draw soldier figure
      const wounded  = m.status === 'wounded';
      const crewImg  = images['crew'];
      // Size: proportional to gun icon, consistent across zoom because we're in nat-px space
      const figH = Math.max(8, gun.iconSz * 0.26);
      const figW = crewImg ? figH * (crewImg.naturalWidth / crewImg.naturalHeight) : figH;

      // Face toward gun centre (or toward MG target if guard)
      const faceAng = pos.role === 'mg_guard' && gun.mgTarget
        ? gun.mgAngle                                         // tracking an enemy
        : Math.atan2(gy - wy, gx - wx);                      // facing gun centre

      ctx.save();
      ctx.translate(wx, wy);
      ctx.rotate(faceAng - Math.PI / 2); // sprite faces downward in image, -PI/2 aligns it toward gun

      if (crewImg) {
        if (wounded) {
          // Amber tint for wounded via composite
          ctx.globalAlpha = 0.85;
          ctx.filter = 'sepia(1) saturate(3) hue-rotate(-10deg) brightness(0.9)';
        }
        ctx.drawImage(crewImg, -figW / 2, -figH / 2, figW, figH);
        ctx.filter = 'none';
        ctx.globalAlpha = 1;
      } else {
        // Canvas fallback
        const bodyR = Math.max(1.8, figH * 0.35);
        const headR = Math.max(1.2, figH * 0.25);
        ctx.fillStyle = wounded ? '#8a6020' : '#3a5020';
        ctx.beginPath(); ctx.ellipse(0, 0, bodyR, bodyR * 0.7, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = wounded ? '#6a4818' : '#2a3c18';
        ctx.beginPath(); ctx.arc(0, -headR * 0.6, headR, 0, Math.PI*2); ctx.fill();
      }

      ctx.restore();

      // ── Wounded indicator — small amber cross on the figure ──
      if (wounded) {
        const cr = Math.max(1, figH * 0.18);
        ctx.strokeStyle = 'rgba(255,180,20,0.9)';
        ctx.lineWidth = lw(1);
        ctx.beginPath(); ctx.moveTo(wx-cr, wy); ctx.lineTo(wx+cr, wy); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(wx, wy-cr); ctx.lineTo(wx, wy+cr); ctx.stroke();
      }
    }
  }
}

// ─── BOSS ROCKETS ───
function drawBossRockets() {
  const frame = performance.now();
  for (const r of bossRocketShots) {
    const [px,py] = np(r.fx, r.fy);
    // Smoke trail — thick, dark orange
    for (let i=0;i<r.trail.length;i++) {
      const t=i/r.trail.length;
      ctx.fillStyle=`rgba(220,80,10,${t*0.4})`;
      const [tx,ty]=np(r.trail[i].fx,r.trail[i].fy);
      ctx.beginPath();ctx.arc(tx,ty,Math.max(1,(1.8+t*3)/camZ),0,Math.PI*2);ctx.fill();
    }
    // Rocket body — bigger than friendly rockets
    const ang=Math.atan2(r.dfy*mapNatH,r.dfx*mapNatW);
    const bLen=Math.max(7,16/camZ), bW=Math.max(1.5,3.5/camZ);
    const flicker=0.75+0.25*Math.sin(frame*0.05+r.age*0.7);
    ctx.save();ctx.translate(px,py);ctx.rotate(ang);
    // Flame
    const fg=ctx.createLinearGradient(-bLen-bLen*flicker,0,-bLen,0);
    fg.addColorStop(0,'rgba(255,50,0,0)');
    fg.addColorStop(0.5,`rgba(255,140,20,${0.7*flicker})`);
    fg.addColorStop(1,`rgba(255,220,80,${0.95*flicker})`);
    ctx.fillStyle=fg;
    ctx.beginPath();
    ctx.moveTo(-bLen,-bW*1.6*flicker);ctx.lineTo(-bLen-bLen*flicker,0);ctx.lineTo(-bLen,bW*1.6*flicker);
    ctx.closePath();ctx.fill();
    // Body — dark red/brown, TOS distinctive
    ctx.fillStyle='#6a2010';
    ctx.fillRect(-bLen,-bW,bLen*1.1,bW*2);
    // Nose
    ctx.fillStyle='#c03010';
    ctx.beginPath();ctx.moveTo(bLen*0.1,-bW);ctx.lineTo(bLen*0.1,bW);ctx.lineTo(bLen*0.7,0);ctx.closePath();ctx.fill();
    ctx.restore();
    // Splash preview ring (subtle, shows danger zone)
    ctx.strokeStyle='rgba(255,60,10,0.15)';
    ctx.lineWidth=lw(1);
    ctx.beginPath();ctx.arc(px,py,r.splash/camZ,0,Math.PI*2);ctx.stroke();
  }
}

// ─── COUNTERFIRE SHOTS ───
function drawCFShots() {
  for (const p of cfShots) {
    for (let i=0;i<p.trail.length;i++) {
      const a=(i/p.trail.length)*.35;
      ctx.fillStyle=`rgba(255,100,20,${a})`;
      const[tx,ty]=np(p.trail[i].fx,p.trail[i].fy);
      ctx.beginPath();ctx.arc(tx,ty,lw(2),0,Math.PI*2);ctx.fill();
    }
    const[px,py]=np(p.fx,p.fy);
    ctx.fillStyle='#ff6020';
    ctx.beginPath();ctx.arc(px,py,lw(3.5),0,Math.PI*2);ctx.fill();
  }
}

// ─── BACK-BLAST PARTICLES ───
function drawBackblasts() {
  for (const b of backblasts) {
    const t = 1 - b.life / b.maxLife;
    ctx.globalAlpha = (1-t) * 0.80;
    const g = Math.floor(160 * (1-t*0.8));
    ctx.fillStyle = `rgb(255,${g},20)`;
    const [bx,by] = np(b.fx,b.fy);
    ctx.beginPath();
    ctx.arc(bx, by, Math.max(0.5, b.size/camZ), 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ─── FRIENDLY PROJECTILES ───
function drawProjectiles() {
  const frame = performance.now();

  for (const p of projectiles) {
    const [px,py] = np(p.fx, p.fy);

    if (p.rocket) {
      // Smoke trail
      for (let i=0; i<p.trail.length; i++) {
        const t = i / p.trail.length;
        const alpha = t * 0.28;
        const radius = Math.max(0.6, (0.8 + (1-t)*2.5) / camZ);
        ctx.fillStyle = `rgba(200,185,155,${alpha})`;
        const [tx,ty] = np(p.trail[i].fx, p.trail[i].fy);
        ctx.beginPath(); ctx.arc(tx, ty, radius, 0, Math.PI*2); ctx.fill();
      }

      const angle = Math.atan2(p.dfy*mapNatH, p.dfx*mapNatW);
      const bLen  = Math.max(5, 12/camZ);    // body length in screen-space
      const bW    = Math.max(1, 2.2/camZ);   // body half-width

      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(angle);

      // Flame flicker using age + time
      const flicker = 0.78 + 0.22 * Math.sin(frame * 0.045 + (p.age||0) * 0.9);
      const flameLen = bLen * (0.65 + flicker * 0.55);

      // Outer flame
      const grad = ctx.createLinearGradient(-bLen - flameLen, 0, -bLen, 0);
      grad.addColorStop(0,   'rgba(255,80,0,0)');
      grad.addColorStop(0.4, `rgba(255,155,20,${0.55*flicker})`);
      grad.addColorStop(1,   `rgba(255,235,100,${0.88*flicker})`);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(-bLen, -bW*1.3*flicker);
      ctx.lineTo(-bLen - flameLen, 0);
      ctx.lineTo(-bLen,  bW*1.3*flicker);
      ctx.closePath(); ctx.fill();

      // Inner white core
      const coreG = ctx.createLinearGradient(-bLen - flameLen*0.5, 0, -bLen, 0);
      coreG.addColorStop(0, 'rgba(255,255,255,0)');
      coreG.addColorStop(1, `rgba(255,255,200,${0.75*flicker})`);
      ctx.fillStyle = coreG;
      ctx.beginPath();
      ctx.moveTo(-bLen, -bW*0.55);
      ctx.lineTo(-bLen - flameLen*0.5, 0);
      ctx.lineTo(-bLen,  bW*0.55);
      ctx.closePath(); ctx.fill();

      // Fins
      ctx.fillStyle = '#607040';
      ctx.beginPath();
      ctx.moveTo(-bLen, -bW); ctx.lineTo(-bLen+bLen*.3, -bW); ctx.lineTo(-bLen, -bW*2.8);
      ctx.closePath(); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(-bLen,  bW); ctx.lineTo(-bLen+bLen*.3,  bW); ctx.lineTo(-bLen,  bW*2.8);
      ctx.closePath(); ctx.fill();

      // Body
      ctx.fillStyle = '#8a9060';
      ctx.fillRect(-bLen, -bW, bLen*1.1, bW*2);

      // Band detail
      ctx.strokeStyle = 'rgba(0,0,0,0.3)';
      ctx.lineWidth = bW * 0.45;
      ctx.beginPath(); ctx.moveTo(-bLen*0.2, -bW); ctx.lineTo(-bLen*0.2, bW); ctx.stroke();

      // Nose cone
      ctx.fillStyle = '#c8c880';
      ctx.beginPath();
      ctx.moveTo(bLen*0.1, -bW); ctx.lineTo(bLen*0.1, bW); ctx.lineTo(bLen*0.65, 0);
      ctx.closePath(); ctx.fill();

      ctx.restore();

    } else {
      // Standard artillery shell OR MG burst round
      const trailLen = p.isMG ? 3 : 7;
      if (p.trail.length > trailLen) p.trail.shift();
      for (let i=0; i<p.trail.length; i++) {
        const a = (i/p.trail.length) * (p.isMG ? 0.55 : 0.38);
        ctx.fillStyle = p.isMG ? `rgba(240,230,80,${a})` : `rgba(255,215,70,${a})`;
        const [tx,ty] = np(p.trail[i].fx, p.trail[i].fy);
        ctx.beginPath(); ctx.arc(tx, ty, lw(p.isMG ? 1 : 2), 0, Math.PI*2); ctx.fill();
      }
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(px, py, lw(p.isMG ? 1.5 : 3), 0, Math.PI*2); ctx.fill();
    }
  }
}

// ─── ENEMIES ───
function drawEnemies() {
  for (const e of enemies) {
    if (e.dead) continue;
    const[x,y]=np(e.fx,e.fy);
    const sz=e.sizeFrac*Math.min(mapNatW,mapNatH);
    const def=ENEMY_DEFS[e.type];
    const img=images[def.mapKey];
    const flash=e.hitFlash>0;

    ctx.save();ctx.translate(x,y);ctx.rotate(e.angle + Math.PI/2);
    if (img) {
      const ar = img.naturalWidth / img.naturalHeight;
      const drawH = sz * 2;
      const drawW = drawH * ar;
      if (flash) { ctx.filter='brightness(3)'; }
      ctx.drawImage(img, -drawW/2, -drawH/2, drawW, drawH);
      ctx.filter='none';
    } else {
      // Fallback canvas shapes — drawn with front pointing UP (toward -y)
      // because we rotate by e.angle + PI/2
      const col = flash ? '#ffffff' : ENEMY_DEFS[e.type].color;
      if (e.type==='tank_t72'||e.type==='tank_t80') {
        ctx.fillStyle=col;
        ctx.fillRect(-sz*.5,-sz,sz,sz*2);           // hull
        ctx.fillStyle=flash?'#ddd':'#1e2810';
        ctx.beginPath();ctx.ellipse(0,0,sz*.38,sz*.48,0,0,Math.PI*2);ctx.fill(); // turret
        ctx.fillRect(-sz*.07,-sz*.9,sz*.14,sz*.8);  // barrel up
      } else if (e.type==='bmp'||e.type==='btr') {
        ctx.fillStyle=col;
        ctx.fillRect(-sz*.55,-sz,sz*1.1,sz*2);
        ctx.fillStyle=flash?'#ddd':'#1e2810';
        ctx.beginPath();ctx.arc(0,-sz*.1,sz*.28,0,Math.PI*2);ctx.fill();
        ctx.fillRect(-sz*.07,-sz*.9,sz*.14,sz*.6);
      } else if (e.type==='drone') {
        ctx.fillStyle=col;
        ctx.beginPath();
        ctx.moveTo(0,-sz);ctx.lineTo(sz*.65,0);ctx.lineTo(0,sz);ctx.lineTo(-sz*.65,0);
        ctx.closePath();ctx.fill();
      } else if (e.type==='msta'||e.type==='tos') {
        ctx.fillStyle=col;
        ctx.fillRect(-sz*.55,-sz*1.1,sz*1.1,sz*2.2);
        ctx.fillStyle=flash?'#ddd':'#1a2010';
        ctx.fillRect(-sz*.5,-sz*.9,sz*1.0,sz*.8);
        ctx.fillRect(-sz*.07,-sz*1.2,sz*.14,sz*.6);
      } else {
        // scout / truck
        ctx.fillStyle=col;
        ctx.fillRect(-sz*.45,-sz,sz*.9,sz*2);
        ctx.fillStyle=flash?'#ddd':'rgba(0,0,0,.3)';
        ctx.fillRect(-sz*.3,-sz*.9,sz*.6,sz*.4);    // windshield at front
      }
    }
    ctx.restore();

    // ── ROTATING TURRET OVERLAY (for return-fire capable units) ──
    if (def.canReturnFire) {
      const bLen = sz * (def.barrelLen||1.0);
      const bW   = sz * (def.barrelW||0.12);
      const hasSprite = !!images[def.mapKey];

      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(e.turretAngle);

      if (hasSprite) {
        // Sprite already shows a barrel — just draw a small aim indicator
        // at the barrel tip so aim direction is still readable
        const tipX = bLen * 0.85;
        // Faint line from centre to tip
        ctx.strokeStyle = 'rgba(255,180,40,0.45)';
        ctx.lineWidth = lw(0.8);
        ctx.setLineDash([lw(2), lw(3)]);
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(tipX, 0); ctx.stroke();
        ctx.setLineDash([]);
        // Glowing dot at tip
        ctx.fillStyle = 'rgba(255,200,60,0.75)';
        ctx.beginPath(); ctx.arc(tipX, 0, Math.max(1, lw(2.5)), 0, Math.PI*2); ctx.fill();
      } else {
        // No sprite — draw the full barrel overlay (fallback shapes have no barrel)
        ctx.strokeStyle = 'rgba(80,100,40,0.55)';
        ctx.lineWidth = lw(1);
        ctx.beginPath(); ctx.arc(0,0,sz*0.38,0,Math.PI*2); ctx.stroke();
        ctx.fillStyle = '#202810';
        ctx.fillRect(0, -bW/2, bLen, bW);
        ctx.fillStyle = '#161e08';
        ctx.fillRect(bLen-bW, -bW*0.75, bW*0.6, bW*1.5);
      }
      ctx.restore();
    }
    const showBar = e.armor>0 || e.hp<e.maxHp;
    if (showBar) {
      const bw=sz*2.6,bx=x-bw/2,by=y-sz-lw(6);
      ctx.fillStyle='rgba(10,6,6,.8)';ctx.fillRect(bx,by,bw,lw(4));
      const frac=e.hp/e.maxHp;
      ctx.fillStyle=frac>.6?'#3a9020':frac>.3?'#908020':'#b01c10';
      ctx.fillRect(bx,by,bw*frac,lw(4));
      // Armour indicator tick
      if (e.armor>.0) {
        ctx.fillStyle='rgba(100,200,220,.5)';
        ctx.fillRect(bx,by,lw(2),lw(4));
      }
    }

    // Label for heavy units (visible at zoom)
    if (camZ>1.8 && (e.type==='msta'||e.type==='tos'||e.type==='tank_t80')) {
      ctx.fillStyle='rgba(200,200,120,.65)';
      ctx.font=`${Math.max(6,rs(9))}px Courier New`;
      ctx.textAlign='center';ctx.textBaseline='top';
      ctx.fillText(def.label,x,y+sz+lw(2));
    }
  }
}

// ─── EFFECTS ───
function drawEffects() {
  for (const ef of effects) {
    const t=1-ef.life/ef.maxLife;
    ctx.globalAlpha=(1-t)*.85;
    const[x,y]=np(ef.fx,ef.fy);
    ctx.fillStyle=ef.color;
    ctx.beginPath();ctx.arc(x,y,(2.5+t*ef.maxLife*.42)/camZ,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
}

// ─── FOB MARKER ───
function drawFOBMarker() {
  const[fx,fy]=PATH_FRACS[FOB_IDX];
  const[x,y]=np(fx,fy);
  const fs=Math.max(6,rs(11));
  const pw=Math.max(40,rs(74)),ph=Math.max(14,rs(25));
  ctx.fillStyle='rgba(10,18,4,.88)';ctx.strokeStyle='#5a8030';ctx.lineWidth=lw(1.5);
  ctx.beginPath();
  if(ctx.roundRect)ctx.roundRect(x-pw/2,y-ph/2,pw,ph,rs(3));
  else ctx.rect(x-pw/2,y-ph/2,pw,ph);
  ctx.fill();ctx.stroke();
  ctx.fillStyle='#9ab840';
  ctx.font=`bold ${fs}px Courier New`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('FOB ALPHA',x,y-ph*.1);
  const pr=rs(3.5);
  for(let i=0;i<6;i++){
    ctx.fillStyle=i<fobHP?'#5a9020':'#3a1010';
    ctx.beginPath();ctx.arc(x-pr*5.5+i*pr*2.2,y+ph*.3,pr,0,Math.PI*2);ctx.fill();
  }
}

// ─── SPAWN MARKER ───
function drawSpawnMarker() {
  const[fx,fy]=PATH_FRACS[0];
  const[x,y]=np(fx,fy);
  const r=rs(9);
  ctx.strokeStyle='rgba(220,50,20,.55)';ctx.lineWidth=lw(1.2);
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.stroke();
  ctx.strokeStyle='rgba(220,50,20,.22)';ctx.lineWidth=lw(1);
  ctx.beginPath();ctx.arc(x,y,r*1.8,0,Math.PI*2);ctx.stroke();
  if (camZ>1.2) {
    ctx.fillStyle='rgba(220,50,20,.38)';
    ctx.font=`${Math.max(5,rs(9))}px Courier New`;
    ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.fillText('ENEMY INGRESS',x,y-r*2.1);
  }
}

// ─── ROUTE EDITOR OVERLAY ───
// Shows numbered waypoints + slot positions. Tap anywhere to get coords.
function drawRouteEditor() {
  const fs = Math.max(7, rs(11));
  ctx.font = `bold ${fs}px Courier New`;

  // Path waypoints — red numbered circles
  for (let i=0;i<PATH_FRACS.length;i++) {
    const [x,y] = np(PATH_FRACS[i][0], PATH_FRACS[i][1]);
    const r = Math.max(5, rs(10));
    ctx.fillStyle = 'rgba(220,40,10,0.85)';
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(i, x, y);
    // Line to next
    if (i < PATH_FRACS.length-1) {
      const [nx2,ny2]=np(PATH_FRACS[i+1][0],PATH_FRACS[i+1][1]);
      ctx.strokeStyle='rgba(220,40,10,0.45)'; ctx.lineWidth=lw(1.5);
      ctx.setLineDash([lw(3),lw(4)]);
      ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(nx2,ny2);ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // Slot positions — cyan numbered squares
  for (let i=0;i<SLOT_FRACS.length;i++) {
    const [x,y] = np(SLOT_FRACS[i][0], SLOT_FRACS[i][1]);
    const r = Math.max(4, rs(8));
    ctx.fillStyle = 'rgba(0,200,220,0.75)';
    ctx.fillRect(x-r, y-r, r*2, r*2);
    ctx.fillStyle = '#000000';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(i, x, y);
  }

  // Mode label
  ctx.fillStyle='rgba(220,40,10,0.7)';
  ctx.font=`bold ${Math.max(8,rs(12))}px Courier New`;
  ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.fillText('EDIT MODE — TAP FOR COORDS', 10/camZ, 10/camZ);
}
function updateHUD() {
  document.getElementById('hud-wave').textContent = waveLabel();
  document.getElementById('hud-kills').textContent = kills;
  document.getElementById('hud-supply').textContent = supply;
  let s=''; for(let i=0;i<6;i++) s+=i<fobHP?'█':'░';
  document.getElementById('hud-fob').textContent = s;
}

function startWave() {
  if (waveActive||gameOver) return;
  buildSpawnQueue(); waveActive=true;
  document.getElementById('btn-start').classList.add('hidden');
  document.getElementById('zoom-hint').classList.add('gone');
  document.getElementById('group-complete').style.display='none';
  document.getElementById('codex').classList.remove('open');
  codexOpen=false;
  document.getElementById('btn-codex').classList.remove('active');
  // Boss wave gets special banner treatment
  const isBoss = isBossWave();
  const b=document.getElementById('wave-banner');
  document.getElementById('wave-num-line').textContent =
    isBoss ? `⚠ BOSS WAVE — GROUP ${groupNum}` : `${waveLabel()} — ${waveName()}`;
  document.getElementById('wave-intel').textContent = waveIntelStr();
  b.classList.add('show');
  setTimeout(()=>b.classList.remove('show'), isBoss?3500:2800);
}
document.getElementById('btn-start').addEventListener('pointerup',e=>{ e.stopPropagation(); startWave(); });

function toggleRanges() {
  showRanges=!showRanges;
  document.getElementById('btn-range').classList.toggle('active',showRanges);
}

function endGame(victory) {
  // Game is infinite — only ends on FOB overrun
  gameOver=true; waveActive=false;
  document.getElementById('end-screen').style.display='flex';
  const t=document.getElementById('end-title'), s=document.getElementById('end-sub');
  t.style.color='#c04020';
  t.textContent='FOB OVERRUN';
  s.textContent=`${waveLabel()} — ${kills} CONFIRMED KILLS BEFORE BREACH`;
}

function restartGame() {
  groupNum=1; waveInGroup=1; fobHP=6; supply=200; kills=0;
  waveActive=false; waveSpawnDone=false; gameOver=false;
  showRanges=false; codexOpen=false;
  unlockedGuns   = new Set(['M119']);
  activeUpgrades = [];
  fireMissionTokens=0; fireMissionArmed=false; fireMissionPending=null;
  enemies=[];projectiles=[];effects=[];cfShots=[];backblasts=[];bossRocketShots=[];placedGuns=[];spawnQueue=[];
  closeGunInfo();
  document.getElementById('end-screen').style.display='none';
  document.getElementById('group-complete').style.display='none';
  document.getElementById('fire-mission-hint').style.display='none';
  document.getElementById('btn-range').classList.remove('active');
  document.getElementById('btn-codex').classList.remove('active');
  document.getElementById('codex').classList.remove('open');
  document.getElementById('zoom-hint').classList.remove('gone');
  const btn=document.getElementById('btn-start');
  btn.textContent=`▶ START ${waveLabel()}`; btn.classList.remove('hidden');
  updateHUD(); updateFireMissionBtn(); buildLayout(); resetCamera(); refreshCodex();
}

// ═══════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════
loadImages(()=>{
  mapImg=images.map;
  if (mapImg) { mapNatW=mapImg.naturalWidth; mapNatH=mapImg.naturalHeight; }
  buildLayout(); resetCamera(); updateHUD();
  updateFireMissionBtn();
  document.getElementById('btn-start').textContent = `▶ START ${waveLabel()}`;
  refreshCodex();
  setTimeout(()=>document.getElementById('zoom-hint').classList.add('gone'),6000);
  render();
});
</script>
</body>
