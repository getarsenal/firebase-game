<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FIREBASE</title>
<style>
  * { margin:0;padding:0;box-sizing:border-box; }
  html,body { width:100%;height:100%;overflow:hidden;background:#0a0a06;font-family:'Courier New',monospace; }
  #game-canvas { display:block;position:fixed;top:0;left:0;touch-action:none; }

  /* ── HUD ── */
  #hud {
    position:fixed;top:0;left:0;right:0;height:48px;
    background:rgba(6,6,3,0.95);border-bottom:1px solid #3a3820;
    display:flex;align-items:center;padding:0 10px;gap:12px;z-index:20;
    pointer-events:none;
  }
  .hud-block { display:flex;flex-direction:column;gap:1px;min-width:42px; }
  .hud-label { font-size:9px;color:#3a3a28;text-transform:uppercase;letter-spacing:.08em; }
  .hud-val   { font-size:15px;font-weight:bold;color:#c8b870; }
  .hud-sep   { width:1px;height:26px;background:#222214;flex-shrink:0; }
  .hud-title { font-size:12px;font-weight:bold;color:#6a5a30;letter-spacing:.22em;flex:1;text-align:center; }

  /* ── CONTROLS ── */
  #controls {
    position:fixed;top:56px;right:8px;z-index:20;
    display:flex;flex-direction:column;gap:4px;
  }
  .ctrl-btn {
    background:rgba(8,10,4,.92);border:1px solid #2a2c14;
    color:#4a5a28;font-size:9px;font-family:'Courier New',monospace;
    letter-spacing:.1em;padding:5px 9px;cursor:pointer;
    text-transform:uppercase;white-space:nowrap;
    -webkit-tap-highlight-color:transparent;
  }
  .ctrl-btn.active { color:#9ab840;border-color:#4a6020; }

  /* ── START BUTTON ── */
  #btn-start {
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    z-index:20;background:rgba(10,16,5,.97);border:1px solid #4a6020;
    color:#9ab840;font-family:'Courier New',monospace;font-size:12px;
    font-weight:bold;letter-spacing:.16em;text-transform:uppercase;
    padding:11px 28px;cursor:pointer;white-space:nowrap;
    -webkit-tap-highlight-color:transparent;
  }
  #btn-start.hidden { display:none; }

  /* ── WAVE INCOMING BANNER ── */
  #wave-banner {
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    z-index:30;pointer-events:none;
    display:flex;flex-direction:column;align-items:center;gap:6px;
    opacity:0;transition:opacity .35s;
  }
  #wave-banner.show { opacity:1; }
  #wave-num-line { font-size:28px;font-weight:bold;color:#c8b870;letter-spacing:.22em;text-transform:uppercase;text-shadow:0 0 18px rgba(200,184,112,.55); }
  #wave-intel {
    font-size:10px;color:#7a7a48;letter-spacing:.12em;text-transform:uppercase;
    background:rgba(6,6,3,.85);border:1px solid #2e2e18;padding:5px 14px;
    max-width:280px;text-align:center;line-height:1.5;
  }

  /* ── GUN PICKER ── */
  #gun-picker {
    position:fixed;bottom:0;left:0;right:0;z-index:25;
    background:rgba(6,7,3,.98);border-top:1px solid #3a3820;
    padding:10px 8px 18px;display:none;flex-direction:column;gap:8px;
  }
  #gun-picker.open { display:flex; }
  #picker-header { display:flex;justify-content:space-between;align-items:center;padding:0 4px; }
  #picker-title  { font-size:10px;color:#4a4a30;letter-spacing:.12em;text-transform:uppercase; }
  #btn-cancel-picker {
    font-size:10px;color:#3a2e18;cursor:pointer;letter-spacing:.1em;
    text-transform:uppercase;padding:3px 10px;border:1px solid #221a0c;
    background:none;font-family:'Courier New',monospace;
  }
  #picker-row { display:flex;gap:8px;justify-content:center;overflow-x:auto;padding:2px 4px; }
  .gun-option {
    display:flex;flex-direction:column;align-items:center;gap:4px;
    background:rgba(12,16,6,.96);border:1px solid #1e2810;
    border-radius:3px;padding:7px 8px;cursor:pointer;min-width:64px;
    -webkit-tap-highlight-color:transparent;
  }
  .gun-option:active { border-color:#6a9030; }
  .gun-option.locked { opacity:.35;pointer-events:none; }
  .gun-option img  { width:52px;height:38px;object-fit:contain; }
  .gun-name { font-size:8px;color:#6a6a40;letter-spacing:.06em;text-align:center; }
  .gun-cost { font-size:10px;color:#c8a830;font-weight:bold; }

  /* ── CODEX / WAVE INTEL ── */
  #codex {
    position:fixed;top:56px;left:8px;z-index:20;
    background:rgba(6,7,3,.95);border:1px solid #2a2c14;
    padding:6px 10px;display:none;flex-direction:column;gap:4px;
    max-width:220px;
  }
  #codex.open { display:flex; }
  #codex-title { font-size:9px;color:#4a4a28;letter-spacing:.12em;text-transform:uppercase;border-bottom:1px solid #1e1e10;padding-bottom:3px; }
  .codex-row { font-size:9px;color:#8a8a50;display:flex;justify-content:space-between;gap:12px; }
  .codex-unit { color:#a0a060; }
  .codex-count { color:#c8b060;font-weight:bold; }

  /* ── END SCREEN ── */
  #end-screen {
    position:fixed;inset:0;z-index:50;background:rgba(5,5,2,.94);
    display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  }
  #end-title { font-size:28px;font-weight:bold;letter-spacing:.2em;text-transform:uppercase; }
  #end-sub   { font-size:11px;color:#4a4a32;letter-spacing:.12em; }
  #btn-restart {
    background:#0c1406;border:1px solid #4a6020;color:#9ab840;
    font-family:'Courier New',monospace;font-size:12px;font-weight:bold;
    letter-spacing:.16em;text-transform:uppercase;padding:10px 26px;cursor:pointer;
  }

  #zoom-hint {
    position:fixed;bottom:76px;left:50%;transform:translateX(-50%);
    z-index:15;font-size:9px;color:rgba(90,90,50,.55);
    letter-spacing:.1em;text-transform:uppercase;pointer-events:none;
    transition:opacity 1s;white-space:nowrap;
  }
  #zoom-hint.gone { opacity:0; }

  /* ── GROUP COMPLETE OVERLAY ── */
  #group-complete {
    position:fixed;inset:0;z-index:60;background:rgba(4,6,2,.96);
    display:none;flex-direction:column;align-items:center;justify-content:center;
    gap:16px;padding:20px;
  }
  #gc-title { font-size:28px;font-weight:bold;color:#c8b870;letter-spacing:.2em;text-transform:uppercase; text-shadow:0 0 20px rgba(200,184,112,.4); }
  #gc-group { font-size:12px;color:#5a5a38;letter-spacing:.16em;text-transform:uppercase; }
  #gc-supply{ font-size:14px;color:#c8a830;font-weight:bold;letter-spacing:.12em; }
  #gc-unlock { width:100%;max-width:320px;text-align:center; }
  .gc-unlock-badge {
    border:1px solid #3a5020;background:rgba(10,18,6,.9);
    padding:10px 16px;display:inline-flex;flex-direction:column;align-items:center;gap:6px;
  }
  .gc-unlock-label { font-size:11px;color:#9ab840;letter-spacing:.12em;text-transform:uppercase;font-weight:bold; }
  #gc-cards-title { font-size:10px;color:#4a4a28;letter-spacing:.14em;text-transform:uppercase; }
  #gc-cards { display:flex;gap:10px;justify-content:center;flex-wrap:wrap;max-width:380px; }
  .upgrade-card {
    display:flex;flex-direction:column;align-items:center;gap:5px;
    background:rgba(10,12,6,.95);border:1px solid #2a2a18;border-radius:4px;
    padding:12px 10px;cursor:pointer;width:100px;
    transition:border-color .15s,background .15s;
    -webkit-tap-highlight-color:transparent;
  }
  .upgrade-card:active { background:rgba(18,22,10,.95); }
  .uc-icon { font-size:22px;line-height:1; }
  .uc-name { font-size:9px;color:#9a9a60;letter-spacing:.1em;text-transform:uppercase;text-align:center;font-weight:bold; }
  .uc-desc { font-size:8px;color:#5a5a38;letter-spacing:.06em;text-align:center;line-height:1.4; }
  #gc-pick-label { font-size:10px;color:#3a5020;letter-spacing:.12em;text-transform:uppercase; }

  /* ── FIRE MISSION ── */
  #fire-mission-hint {
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    z-index:35;font-size:13px;font-weight:bold;color:rgba(255,80,20,.85);
    letter-spacing:.18em;text-transform:uppercase;pointer-events:none;
    text-shadow:0 0 12px rgba(255,60,10,.5);display:none;
  }
  #btn-fire-mission {
    background:rgba(30,6,4,.92);border:1px solid #6a1808;color:#c04020;
    font-size:9px;font-family:'Courier New',monospace;letter-spacing:.1em;
    padding:5px 9px;cursor:pointer;text-transform:uppercase;white-space:nowrap;
    -webkit-tap-highlight-color:transparent;
  }
  #btn-fire-mission.active { color:#ff5030;border-color:#c03010;background:rgba(60,10,4,.95); }
  body.fm-armed { cursor:crosshair; }

  /* ── DIG IN ── */
  #dig-row {
    display:flex;flex-direction:column;gap:4px;margin-top:4px;
  }
  #dig-status {
    display:flex;align-items:center;gap:8px;
    font-size:9px;color:#5a4a28;letter-spacing:.1em;text-transform:uppercase;
  }
  .dig-pip { width:14px;height:14px;border-radius:2px;flex-shrink:0; }
  .dig-pip.empty  { background:#1a1410;border:1px solid #2a2010; }
  .dig-pip.scrape { background:#6a5030;border:1px solid #8a6838; }
  .dig-pip.sandbag{ background:#8a7040;border:1px solid #a08848; }
  .dig-pip.harden { background:#5a5545;border:1px solid #7a7060; }
  #dig-progress-wrap {
    height:5px;background:#0e0c08;border:1px solid #2a2010;border-radius:2px;overflow:hidden;
  }
  #dig-progress-bar {
    height:100%;background:#8a7040;transition:width .3s;
  }
  #btn-dig {
    width:100%;background:rgba(20,14,6,.9);border:1px solid #5a4020;
    color:#c0902a;font-family:'Courier New',monospace;font-size:11px;
    font-weight:bold;letter-spacing:.12em;text-transform:uppercase;
    padding:9px;cursor:pointer;text-align:center;
  }
  #btn-dig:active { background:rgba(40,24,8,.9); }
  #btn-dig.maxed  { opacity:.35;pointer-events:none; }
  #btn-dig.digging{ color:#7a6030;pointer-events:none; }

  /* ── ROUTE EDITOR OVERLAY ── */
  #coord-toast {
    position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
    z-index:40;background:rgba(6,8,3,.95);border:1px solid #3a5020;
    color:#9ab840;font-family:'Courier New',monospace;font-size:11px;
    letter-spacing:.1em;padding:6px 14px;pointer-events:none;
    opacity:0;transition:opacity .3s;white-space:nowrap;
  }
  #coord-toast.show { opacity:1; }

  /* ── GUN INFO PANEL ── */
  #gun-info {
    position:fixed;bottom:0;left:0;right:0;z-index:25;
    background:rgba(6,7,3,.98);border-top:1px solid #3a3820;
    padding:12px 16px 20px;display:none;flex-direction:column;gap:10px;
  }
  #gun-info.open { display:flex; }
  #gun-info-header { display:flex;justify-content:space-between;align-items:center; }
  #gun-info-name { font-size:14px;font-weight:bold;color:#c8b870;letter-spacing:.12em; }
  #gun-info-close {
    font-size:10px;color:#3a2e18;cursor:pointer;letter-spacing:.1em;
    text-transform:uppercase;padding:3px 10px;border:1px solid #221a0c;
    background:none;font-family:'Courier New',monospace;
  }
  #gun-info-stats {
    display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px 12px;
  }
  .info-stat { display:flex;flex-direction:column;gap:2px; }
  .info-stat-label { font-size:8px;color:#3a3a28;text-transform:uppercase;letter-spacing:.08em; }
  .info-stat-val   { font-size:13px;font-weight:bold;color:#9ab840; }
  #gun-info-hp { display:flex;gap:4px;align-items:center; }
  .hp-pip { width:16px;height:8px;border-radius:1px; }
  .hp-pip.full { background:#4a8020; }
  .hp-pip.empty{ background:#3a1010; }
  #btn-displace {
    background:rgba(40,12,6,.9);border:1px solid #7a2010;color:#c05030;
    font-family:'Courier New',monospace;font-size:11px;font-weight:bold;
    letter-spacing:.14em;text-transform:uppercase;padding:9px;cursor:pointer;
    text-align:center;
  }
  #btn-displace:active { background:rgba(80,20,8,.9); }
</style>
</head>
<body>

<canvas id="game-canvas"></canvas>

<div id="hud">
  <div class="hud-block"><div class="hud-label">Wave</div><div class="hud-val" id="hud-wave">1/10</div></div>
  <div class="hud-sep"></div>
  <div class="hud-block"><div class="hud-label">FOB</div><div class="hud-val" id="hud-fob">██████</div></div>
  <div class="hud-sep"></div>
  <div class="hud-title">FIREBASE</div>
  <div class="hud-sep"></div>
  <div class="hud-block"><div class="hud-label">Kills</div><div class="hud-val" id="hud-kills">0</div></div>
  <div class="hud-sep"></div>
  <div class="hud-block"><div class="hud-label">Supply</div><div class="hud-val" id="hud-supply">200</div></div>
</div>

<!-- Wave intel codex (top-left, opens between waves) -->
<div id="codex">
  <div id="codex-title">NEXT WAVE INTEL</div>
  <div id="codex-body"></div>
</div>

<div id="controls">
  <button class="ctrl-btn" id="btn-range" onclick="toggleRanges()">◎ RANGE</button>
  <button class="ctrl-btn" onclick="resetCamera()">⊞ RESET</button>
  <button class="ctrl-btn" id="btn-codex" onclick="toggleCodex()">☰ INTEL</button>
  <button id="btn-fire-mission" onclick="toggleFireMission()">☢ FIRE MISSION (0)</button>
  <button class="ctrl-btn" id="btn-route-edit" onclick="toggleRouteEdit()">✎ EDIT</button>
</div>

<!-- Coordinate toast for route editing -->
<div id="coord-toast"></div>

<button id="btn-start">▶ START WAVE 1</button>

<div id="wave-banner">
  <div id="wave-num-line"></div>
  <div id="wave-intel"></div>
</div>

<div id="zoom-hint">PINCH / SCROLL TO ZOOM · DRAG TO PAN</div>

<div id="gun-picker">
  <div id="picker-header">
    <div id="picker-title">SELECT WEAPON SYSTEM — TAP TO DEPLOY</div>
    <button id="btn-cancel-picker">✕ CANCEL</button>
  </div>
  <div id="picker-row"></div>
</div>

<div id="gun-info">
  <div id="gun-info-header">
    <div id="gun-info-name"></div>
    <button id="gun-info-close" onclick="closeGunInfo()">✕ CLOSE</button>
  </div>
  <div id="gun-info-stats"></div>
  <div id="gun-info-hp" style="display:flex;align-items:center;gap:3px;"></div>
  <div id="gun-info-crew" style="display:flex;align-items:center;gap:3px;"></div>
  <div style="display:flex;gap:8px;margin-top:2px;">
    <button id="btn-repair" onclick="repairGun()" style="flex:1;background:rgba(6,20,6,.9);border:1px solid #2a6010;color:#6ab030;font-family:'Courier New',monospace;font-size:11px;font-weight:bold;letter-spacing:.12em;text-transform:uppercase;padding:9px;cursor:pointer;text-align:center;"></button>
    <button id="btn-displace" onclick="displaceGun()" style="flex:1;background:rgba(40,12,6,.9);border:1px solid #7a2010;color:#c05030;font-family:'Courier New',monospace;font-size:11px;font-weight:bold;letter-spacing:.14em;text-transform:uppercase;padding:9px;cursor:pointer;text-align:center;"></button>
  </div>
  <button id="btn-crew" onclick="resupplyCrew()" style="width:100%;background:rgba(6,14,20,.9);border:1px solid #1a5070;color:#40a0c0;font-family:'Courier New',monospace;font-size:11px;font-weight:bold;letter-spacing:.12em;text-transform:uppercase;padding:9px;cursor:pointer;text-align:center;margin-top:4px;"></button>
  <!-- Dig-In section -->
  <div id="dig-row">
    <div id="dig-status"></div>
    <div id="dig-progress-wrap" style="display:none"><div id="dig-progress-bar"></div></div>
    <button id="btn-dig" onclick="digIn()"></button>
  </div>
</div>

<div id="end-screen">
  <div id="end-title"></div>
  <div id="end-sub"></div>
  <button id="btn-restart" onclick="restartGame()">↺ RESTART</button>
</div>

<!-- Group complete overlay -->
<div id="group-complete">
  <div id="gc-title"></div>
  <div id="gc-group"></div>
  <div id="gc-supply"></div>
  <div id="gc-unlock"></div>
  <div id="gc-pick-label">CHOOSE ONE UPGRADE</div>
  <div id="gc-cards-title"></div>
  <div id="gc-cards"></div>
</div>

<!-- Fire mission targeting hint -->
<div id="fire-mission-hint">☢ TAP TARGET ON MAP</div>

<script>
// ═══════════════════════════════════════════════════
// CANVAS
// ═══════════════════════════════════════════════════
const canvas = document.getElementById('game-canvas');
const ctx    = canvas.getContext('2d');
const HUD_H  = 48;
let W, H;

let mapImg  = null;
let mapNatW = 1000, mapNatH = 1000;

// ═══════════════════════════════════════════════════
// CAMERA
// ═══════════════════════════════════════════════════
let camFx=.5, camFy=.5, camZ=1;

function mfToScr(fx,fy) {
  return [
    (fx*mapNatW - camFx*mapNatW)*camZ + W/2,
    (fy*mapNatH - camFy*mapNatH)*camZ + HUD_H + (H-HUD_H)/2,
  ];
}
function scrToMf(sx,sy) {
  return [
    ((sx-W/2)/camZ + camFx*mapNatW)/mapNatW,
    ((sy-HUD_H-(H-HUD_H)/2)/camZ + camFy*mapNatH)/mapNatH,
  ];
}
function resetCamera() {
  if (!mapImg) return;
  camZ  = Math.min(W/mapNatW, (H-HUD_H)/mapNatH);
  camFx = .5; camFy = .5;
}
function clampCam() {
  camZ  = Math.max(.2, Math.min(12, camZ));
  const hw=W/2/camZ/mapNatW, hh=(H-HUD_H)/2/camZ/mapNatH;
  camFx = Math.max(hw,  Math.min(1-hw,  camFx));
  camFy = Math.max(hh,  Math.min(1-hh,  camFy));
}
function zoomAt(sx,sy,ratio) {
  const [fx,fy]=scrToMf(sx,sy);
  camZ*=ratio; clampCam();
  const [nx,ny]=mfToScr(fx,fy);
  camFx+=(nx-sx)/(camZ*mapNatW);
  camFy+=(ny-sy)/(camZ*mapNatH);
  clampCam();
}

// ═══════════════════════════════════════════════════
// PATH WAYPOINTS  (map-fraction coords)
// ═══════════════════════════════════════════════════
const PATH_FRACS = [
  // ── Entry sweep from north ──
  [0.519, 0.060],   //  0  spawn
  [0.530, 0.118],   //  1
  [0.520, 0.144],   //  2
  [0.492, 0.193],   //  3
  [0.486, 0.274],   //  4
  // ── Hard left sweep ──
  [0.432, 0.245],   //  5
  [0.367, 0.259],   //  6
  [0.346, 0.276],   //  7
  [0.253, 0.293],   //  8  far-left apex
  [0.263, 0.318],   //  9
  // ── Right turn back through centre ──
  [0.367, 0.346],   // 10
  [0.475, 0.335],   // 11
  [0.486, 0.370],   // 12
  // ── South through valley ──
  [0.406, 0.456],   // 13
  [0.455, 0.527],   // 14
  [0.437, 0.641],   // 15
  [0.450, 0.688],   // 16
  // ── South-west into lower valley ──
  [0.406, 0.794],   // 17
  [0.326, 0.767],   // 18
  [0.295, 0.817],   // 19
  [0.244, 0.819],   // 20
  [0.226, 0.836],   // 21  merged 21+22 (0.012 apart)
  // ── Valley zigzag — smoothed ──
  [0.297, 0.880],   // 22
  [0.338, 0.869],   // 23  averaged 25+26 y-reversal
  [0.360, 0.890],   // 24  merged 27+28
  [0.392, 0.861],   // 25  averaged 29+30
  // ── East toward FOB ──
  [0.459, 0.884],   // 26
  [0.503, 0.864],   // 27
  [0.566, 0.840],   // 28
  [0.624, 0.840],   // 29
  [0.687, 0.873],   // 30
  [0.757, 0.849],   // 31
  [0.798, 0.869],   // 32
  [0.791, 0.888],   // 33  FOB ALPHA
];
const FOB_IDX = PATH_FRACS.length - 1;

const SLOT_FRACS = [
  // ── ROW 1 (y≈0.09) ──
  [0.107, 0.090],   //  0  near "Ring", upper-left valley
  [0.424, 0.110],   //  1  top-centre, north of Woodbury
  [0.710, 0.105],   //  2  upper-right, east corridor

  // ── ROW 2 (y≈0.17-0.22) ──
  [0.174, 0.171],   //  3  far-left, Bloomfield west
  [0.326, 0.183],   //  4  Bloomfield valley
  [0.422, 0.161],   //  5  near Woodbury village
  [0.622, 0.211],   //  6  right of centre, flat bench
  [0.847, 0.184],   //  7  far-right, east corridor flat

  // ── ROW 3 (y≈0.26-0.30) ──
  [0.137, 0.246],   //  8  far-left, below Dunning
  [0.298, 0.264],   //  9  left valley
  [0.344, 0.286],   // 10  left valley (close pair)
  [0.433, 0.295],   // 11  centre valley, New Enterprise area

// ═══════════════════════════════════════════════════
// INFINITE WAVE / GROUP SYSTEM
// Group 1 = 5 waves. Group 2+ = 10 waves. Boss on last wave of each group.
// ═══════════════════════════════════════════════════

// What each group completion unlocks
const GROUP_UNLOCKS = { 1:'M777', 2:'M109', 3:'M270', 4:'M142' };

// Wave names by position within group (0-indexed progress buckets)
const WAVE_NAMES = [
  'PROBE ELEMENT','SUPPLY CONVOY','MECHANISED ADVANCE','APC ASSAULT',
  'ARMOURED THRUST','COMBINED ARMS','HEAVY ARMOUR','MASS ASSAULT',
  'BREAKTHROUGH ATTEMPT','FINAL PUSH',
];
const BOSS_NAMES = [
  'COMMAND ELEMENT','HEAVY STRIKE FORCE','ARMOURED COLUMN',
  'BREAKTHROUGH FORCE','IRON FIST','STEEL WAVE',
];

function gSize() { return groupNum === 1 ? 5 : 10; }
function isBossWave() { return waveInGroup === gSize(); }

function generateWaveGroups() {
  const g  = groupNum;
  const w  = waveInGroup;
  const gs = gSize();
  const prog = w / gs;               // 0→1 progress within group

  // Scaling — HP grows 35% per group, count 20%, speed 6%
  const hpMult  = 1 + (g - 1) * 0.35;
  const cnt = (base) => Math.max(1, Math.round(base * (1 + (g-1)*0.18)));

  if (isBossWave()) {
    // Boss: TOS + T-80 escort + Msta support + drones
    return [
      { t:'tos',      n: Math.min(1+Math.floor((g-1)/2), 3), hpMult },
      { t:'tank_t80', n: cnt(2+Math.floor(g/2)),              hpMult },
      { t:'msta',     n: Math.max(0, Math.floor(g/2)),        hpMult },
      { t:'drone',    n: cnt(6+g),                             hpMult },
    ].filter(e=>e.n>0);
  }

  if (prog <= 0.25) {
    const t = [{ t:'truck', n:cnt(4+g), hpMult }, { t:'scout', n:cnt(3), hpMult }];
    if (g>=2) t.push({ t:'drone', n:cnt(4), hpMult });
    return t;
  } else if (prog <= 0.50) {
    return [
      { t:'btr', n:cnt(2+g),             hpMult },
      { t:'bmp', n:cnt(2+Math.floor(g/2)), hpMult },
      { t:'drone',n:cnt(3),              hpMult },
    ];
  } else if (prog <= 0.75) {
    const t = [
      { t:'bmp',      n:cnt(3),              hpMult },
      { t:'tank_t72', n:cnt(2+Math.floor(g/2)), hpMult },
    ];
    if (g>=3) t.push({ t:'msta', n:1, hpMult });
    return t;
  } else {
    const t = [
      { t:'tank_t72', n:cnt(3),          hpMult },
      { t:'tank_t80', n:cnt(Math.max(1,g-1)), hpMult },
    ];
    if (g>=2) t.push({ t:'drone', n:cnt(8), hpMult });
    return t;
  }
}

function waveLabel() {
  return `G${groupNum}-W${waveInGroup}/${gSize()}`;
}
function waveName() {
  if (isBossWave()) return BOSS_NAMES[Math.min(groupNum-1, BOSS_NAMES.length-1)];
  const idx = Math.floor((waveInGroup/gSize()) * WAVE_NAMES.length);
  return WAVE_NAMES[Math.min(idx, WAVE_NAMES.length-1)];
}

function shuffleArray(arr) {
  for (let i=arr.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

// Recompute a gun's effective stats from base + active upgrades
// ═══════════════════════════════════════════════════
// GUN RANK SYSTEM
// Rank is earned per gun through kills. Lost on displace/replace.
// ═══════════════════════════════════════════════════
const RANKS = [
  { abbr:'PVT', name:'Private',            kills:0,   dmg:1.00, rofMult:1.00, rangeMult:1.00 },
  { abbr:'PV2', name:'Private 2nd Class',  kills:5,   dmg:1.06, rofMult:0.97, rangeMult:1.00 },
  { abbr:'PFC', name:'Private 1st Class',  kills:15,  dmg:1.12, rofMult:0.93, rangeMult:1.03 },
  { abbr:'SPC', name:'Specialist',         kills:30,  dmg:1.18, rofMult:0.88, rangeMult:1.06 },
  { abbr:'SGT', name:'Sergeant',           kills:55,  dmg:1.26, rofMult:0.83, rangeMult:1.10 },
  { abbr:'SSG', name:'Staff Sergeant',     kills:90,  dmg:1.34, rofMult:0.78, rangeMult:1.14 },
  { abbr:'SFC', name:'Sergeant 1st Class', kills:140, dmg:1.42, rofMult:0.73, rangeMult:1.18 },
  { abbr:'MSG', name:'Master Sergeant',    kills:200, dmg:1.52, rofMult:0.67, rangeMult:1.22 },
  { abbr:'SGM', name:'Sergeant Major',     kills:280, dmg:1.62, rofMult:0.60, rangeMult:1.28 },
];

function checkRankUp(gun) {
  const next = RANKS[gun.rankIdx + 1];
  if (next && gun.gunKills >= next.kills) {
    gun.rankIdx++;
    recalcGunStats(gun);
    // Gold flash on rank up
    for (let i=0;i<6;i++) effects.push({
      fx: gun.fx + (Math.random()-.5)*0.02, fy: gun.fy + (Math.random()-.5)*0.02,
      color:'#ffd700', life:30, maxLife:30,
    });
  }
}

function recalcGunStats(gun) {
  const def   = GUN_DEFS[gun.gunKey];
  const rank  = RANKS[gun.rankIdx || 0];
  const diagPx = Math.hypot(mapNatW, mapNatH);
  // Range: base × rank × upgrade
  gun.rangePx = def.rangeFrac * diagPx
    * rank.rangeMult
    * (activeUpgrades.includes('extended_range') ? 1.20 : 1);
  // ROF: lower = faster. base × rank × upgrade
  gun.rof = Math.round(def.rof
    * rank.rofMult
    * (activeUpgrades.includes('hot_loads') ? 0.85 : 1));
  // Damage: base × rank (stored on gun so projectiles read it directly)
  gun.damage = Math.round(def.damage * rank.dmg);
  // Max HP: base 6 + hardened_post upgrade + cumulative dig HP bonuses
  const digHpBonus = DIG_STAGES.slice(0, gun.digLevel||0).reduce((s,d)=>s+d.hpBonus, 0);
  gun.maxHp = 6
    + (activeUpgrades.includes('hardened_post') ? 2 : 0)
    + digHpBonus;
}

    ['msta_map',  'assets/MSTA_MapIcon.png'],
    ['tos_map',   'assets/TOS_MapIcon.png'],
  ];
  let rem = list.length;
  list.forEach(([k,src]) => {
    const img = new Image();

    img.onerror = () => { images[k]=null;  if(--rem===0) cb(); };

  });
}

function buildLayout() {

  H = canvas.height = window.innerHeight;
  if (mapImg) { mapNatW=mapImg.naturalWidth; mapNatH=mapImg.naturalHeight; }
  const prev = placedGuns.map(g=>({...g}));
  gunSlots = SLOT_FRACS.map(([fx,fy])=>({fx,fy,occupied:false,gun:null}));

// ═══════════════════════════════════════════════════
// PATH UTILITY
// ═══════════════════════════════════════════════════
function getPathPos(dist) {
  let rem=dist;
  for (let i=0;i<PATH_FRACS.length-1;i++) {
    const a=PATH_FRACS[i],b=PATH_FRACS[i+1];
    const seg=Math.hypot((b[0]-a[0])*mapNatW,(b[1]-a[1])*mapNatH);
    if (rem<=seg) {
      const t=rem/seg;
      return { fx:a[0]+(b[0]-a[0])*t, fy:a[1]+(b[1]-a[1])*t,
               angle:Math.atan2((b[1]-a[1])*mapNatH,(b[0]-a[0])*mapNatW), done:false };
    }
    rem-=seg;
  }
  const l=PATH_FRACS[PATH_FRACS.length-1];
  return {fx:l[0],fy:l[1],angle:0,done:true};
}

function openGunPicker(idx) {
  pendingSlotIdx=idx;

  row.innerHTML='';

  for (const [key,def] of Object.entries(GUN_DEFS)) {
    if (!unlockedGuns.has(key)) continue;   // locked by progression
    const el=document.createElement('div');
    el.className='gun-option'+(supply<def.cost?' locked':'');
    el.innerHTML=`<img src="${def.menuSrc}" alt="${def.label}">
      <div class="gun-name">${def.label}</div>
      <div class="gun-cost">$${def.cost}</div>`;
    el.addEventListener('pointerup',e=>{ e.stopPropagation(); placeGun(key,idx); });
    row.appendChild(el);
  }
  document.getElementById('picker-title').textContent =
    midWave ? 'DEPLOY MID-WAVE — UNIT OPERATIONAL IMMEDIATELY' : 'SELECT WEAPON SYSTEM — TAP TO DEPLOY';
  document.getElementById('gun-picker').classList.add('open');

function placeGun(key,idx) {
  const def=GUN_DEFS[key];
  if (supply<def.cost) return;
  supply-=def.cost;
  const s=gunSlots[idx]; s.occupied=true;
  const diagPx=Math.hypot(mapNatW,mapNatH);

  // Build crew array — each member: { status:'ok'|'wounded'|'dead', woundTimer:0 }
  const crew = [];
  for (let i=0;i<def.crewMax;i++) crew.push({ status:'ok', woundTimer:0 });

  const gun={
    slotIdx:idx, gunKey:key,
    fx:s.fx, fy:s.fy,
    rangePx: def.rangeFrac*diagPx,
    damage:def.damage, rof:def.rof, projSpd:def.projSpd,
    reloadTimer:0, angle:-Math.PI/2,
    shell:def.shell, iconSz:def.iconSz, hp:6, maxHp:6,
    recoilTimer:0, flashTimer:0,
    crew,
    mgTimer:0, mgAngle:-Math.PI/2, mgTarget:null,
    gunKills:0, rankIdx:0,
    digLevel:0, isDigging:false, digTimer:0,   // fortification
  };
  s.gun=gun; placedGuns.push(gun);
  recalcGunStats(gun);   // apply any active upgrades
  closePicker(); updateHUD();
}

// Returns effective reload frames accounting for crew losses
function effectiveRof(gun) {
  const def = GUN_DEFS[gun.gunKey];
  if (!def.crewMax) return gun.rof; // mechanized/rocket — unaffected
  const alive = gun.crew.filter(c=>c.status!=='dead').length;
  if (alive === 0) return Infinity; // gun goes silent
  // Each lost crew member adds proportional reload penalty
  return Math.round(gun.rof * (def.crewMax / alive));
}

// Returns active (non-dead) crew count
function activeCrew(gun) {
  return gun.crew.filter(c=>c.status!=='dead').length;
}

// Refresh dig countdown every second while panel is open
setInterval(() => {
  if (selectedGunSlotIdx === null) return;
  const slot = gunSlots[selectedGunSlotIdx];
  if (!slot?.occupied || !slot.gun?.isDigging) return;
  const gun  = slot.gun;
  const secsLeft = Math.ceil(gun.digTimer / 60);

function repairGun() {
  if (selectedGunSlotIdx === null) return;
  const slot = gunSlots[selectedGunSlotIdx];
  if (!slot || !slot.occupied) return;
  const gun  = slot.gun;
  const missingHp  = gun.maxHp - gun.hp;
  if (missingHp <= 0) return;
  const repairCost = missingHp * REPAIR_COST_PER_HP;
  if (supply < repairCost) return;
  supply  -= repairCost;
  gun.hp   = gun.maxHp;
  updateHUD();
  // Re-open to refresh the panel state
  openGunInfo(selectedGunSlotIdx);
}

function resupplyCrew() {
  if (selectedGunSlotIdx === null || waveActive) return;
  const slot = gunSlots[selectedGunSlotIdx];
  if (!slot || !slot.occupied) return;
  const gun = slot.gun;
  const def = GUN_DEFS[gun.gunKey];
  if (!def.crewMax || supply < def.crewCost) return;
  supply -= def.crewCost;
  // Replace all casualties
  for (const m of gun.crew) m.status = 'ok';
  updateHUD();
  openGunInfo(selectedGunSlotIdx);
}

function displaceGun() {
  const slot = gunSlots[selectedGunSlotIdx];
  if (!slot || !slot.occupied) return;
  const gun  = slot.gun;
  const def  = GUN_DEFS[gun.gunKey];
  const refund = Math.floor(def.cost * 0.8);
  supply += refund;
  // Remove from placedGuns
  const idx = placedGuns.indexOf(gun);
  if (idx > -1) placedGuns.splice(idx, 1);
  slot.occupied = false;
  slot.gun = null;
  closeGunInfo();
  updateHUD();
}

function digIn() {
  if (selectedGunSlotIdx === null) return;
  if (waveActive) return;   // initiation requires between waves
  const slot = gunSlots[selectedGunSlotIdx];
  if (!slot?.occupied) return;
  const gun  = slot.gun;
  if (gun.isDigging || gun.digLevel >= DIG_STAGES.length) return;
  const stage = DIG_STAGES[gun.digLevel];
  if (supply < stage.cost) return;
  supply -= stage.cost;
  gun.isDigging = true;
  gun.digTimer  = stage.frames;
  updateHUD();
  openGunInfo(selectedGunSlotIdx);
}
function toggleCodex() {
  codexOpen=!codexOpen;
  document.getElementById('codex').classList.toggle('open',codexOpen);
  document.getElementById('btn-codex').classList.toggle('active',codexOpen);
  if (codexOpen) refreshCodex();
}
function refreshCodex() {
  const body  = document.getElementById('codex-body');
  const title = document.getElementById('codex-title');
  // Preview next wave (or next group's wave 1 if we just finished a group)
  const savedW = waveInGroup;
  if (waveInGroup < gSize()) waveInGroup++;
  else { /* we'll be on next group's wave 1 already — groupNum already incremented */ }
  const nextGroups = generateWaveGroups();
  waveInGroup = savedW;

  title.textContent = `NEXT WAVE — ${waveLabel()} ${isBossWave()?'⚠ BOSS':''}`;
  body.innerHTML = '';
  for (const g of nextGroups) {
    const def = ENEMY_DEFS[g.t];

    row.className = 'codex-row';
    row.innerHTML = `<span class="codex-unit">${def.label}</span><span class="codex-count">×${g.n}</span>`;
    body.appendChild(row);
  }
}

// ═══════════════════════════════════════════════════
// POINTER INPUT
// ═══════════════════════════════════════════════════
let ptrs={}, lastPinchDist=null, dragStart=null, didDrag=false;
const DRAG_PX=7;

canvas.addEventListener('pointerdown',e=>{
  ptrs[e.pointerId]={x:e.clientX,y:e.clientY};
  canvas.setPointerCapture(e.pointerId);
  if (Object.keys(ptrs).length===1) { dragStart={cfx:camFx,cfy:camFy,sx:e.clientX,sy:e.clientY}; didDrag=false; }
  if (Object.keys(ptrs).length===2) { lastPinchDist=pinchDist(); dragStart=null; }
});
canvas.addEventListener('pointermove',e=>{
  if (!ptrs[e.pointerId]) return;
  ptrs[e.pointerId]={x:e.clientX,y:e.clientY};
  const pts=Object.values(ptrs);
  if (pts.length===2) {
    const d=pinchDist();
    if (lastPinchDist) { const mx=(pts[0].x+pts[1].x)/2,my=(pts[0].y+pts[1].y)/2; zoomAt(mx,my,d/lastPinchDist); }
    lastPinchDist=d;
  } else if (pts.length===1 && dragStart) {
    const dx=e.clientX-dragStart.sx, dy=e.clientY-dragStart.sy;
    if (Math.hypot(dx,dy)>DRAG_PX) didDrag=true;
    if (didDrag) { camFx=dragStart.cfx-dx/(camZ*mapNatW); camFy=dragStart.cfy-dy/(camZ*mapNatH); clampCam(); }
  }
});
canvas.addEventListener('pointerup',e=>{
  const wasSingle=Object.keys(ptrs).length===1;
  delete ptrs[e.pointerId]; lastPinchDist=null;
  if (wasSingle&&!didDrag) handleTap(e.clientX,e.clientY);
  if (Object.keys(ptrs).length===0) dragStart=null;
});
canvas.addEventListener('pointercancel',e=>delete ptrs[e.pointerId]);
canvas.addEventListener('wheel',e=>{ e.preventDefault(); zoomAt(e.clientX,e.clientY,e.deltaY<0?1.12:.89); },{passive:false});
function pinchDist() { const p=Object.values(ptrs); return Math.hypot(p[1].x-p[0].x,p[1].y-p[0].y); }

function handleTap(sx,sy) {
  if (gameOver||sy<HUD_H) return;

  // Route edit mode — tap anywhere to show/copy coordinates
  if (routeEditMode) {
    const [fx, fy] = scrToMf(sx, sy);
    showCoordToast(fx, fy);
    return;
  }

  // Fire mission targeting
  if (fireMissionArmed) {
    const [fx,fy] = scrToMf(sx,sy);
    launchFireMission(fx,fy);
    return;
  }

  for (let i=0;i<gunSlots.length;i++) {
    const s=gunSlots[i];
    const [slx,sly]=mfToScr(s.fx,s.fy);
    const dist=Math.hypot(sx-slx,sy-sly);
    if (dist<30) {
      if (s.occupied) { openGunInfo(i); return; }
      else { openGunPicker(i); return; }
    }
  }
  closeGunInfo();
}

// UPDATE
// ═══════════════════════════════════════════════════
function update() {
  if (gameOver) return;

  // ── Always runs (wave or not) ──
  // Dig-in timers — digging continues through waves and between them
  for (const gun of placedGuns) {
    if (gun.isDigging && gun.digTimer > 0) {
      gun.digTimer--;
      if (gun.digTimer <= 0) {
        gun.isDigging = false;
        gun.digLevel++;
        // Recalc stats — this increases maxHp via hpBonus
        const prevMax = gun.maxHp;
        recalcGunStats(gun);
        const hpGain = gun.maxHp - prevMax;
        if (hpGain > 0) gun.hp = Math.min(gun.hp + hpGain, gun.maxHp);
        for (let i=0;i<8;i++) effects.push({
          fx:gun.fx+(Math.random()-.5)*0.015, fy:gun.fy+(Math.random()-.5)*0.015,
          color:DIG_STAGES[gun.digLevel-1].color, life:28, maxLife:28,
        });
        if (selectedGunSlotIdx !== null && gunSlots[selectedGunSlotIdx]?.gun === gun)
          openGunInfo(selectedGunSlotIdx);
      }
    }
  }

  if (!waveActive) return;

  // Spawn
  if (spawnQueue.length>0) {
    if (++spawnTimer>=SPAWN_FRAMES) { spawnEnemy(spawnQueue.shift()); spawnTimer=0; }
  } else { waveSpawnDone=true; }

  // Move enemies + counterfire
  for (const e of enemies) {
    if (e.dead) continue;
    e.dist+=e.spd;
    const pos=getPathPos(e.dist);
    e.fx=pos.fx; e.fy=pos.fy; e.angle=pos.angle;
    if (e.hitFlash>0) e.hitFlash--;

    // Counterfire (Msta etc.)
    if (e.counterfire) {
      e.cfCooldown--;
      if (e.cfCooldown<=0 && placedGuns.length>0) {
        e.cfCooldown=e.cfRate;
        // Fire at nearest gun
        let bestGun=null, bestD=Infinity;
        for (const g of placedGuns) {
          const d=Math.hypot((g.fx-e.fx)*mapNatW,(g.fy-e.fy)*mapNatH);
          if (d<bestD) { bestGun=g; bestD=d; }
        }
        if (bestGun) {
          const ang=Math.atan2((bestGun.fy-e.fy)*mapNatH,(bestGun.fx-e.fx)*mapNatW);
          cfShots.push({
            fx:e.fx, fy:e.fy,
            dfx:2.5*Math.cos(ang)/mapNatW, dfy:2.5*Math.sin(ang)/mapNatH,
            targetGun:bestGun, dead:false, trail:[],
          });
        }
      }
    }

    // ── BOSS ROCKETS (TOS-1) ──
    if (ENEMY_DEFS[e.type].bossRockets && placedGuns.length > 0) {
      const def = ENEMY_DEFS[e.type];
      if (!e.bossRocketTimer) e.bossRocketTimer = Math.floor(Math.random()*120)+60;
      e.bossRocketTimer--;
      if (e.bossRocketTimer <= 0) {
        e.bossRocketTimer = def.bossRocketRate;
        // Pick a random gun as target for each of the 3 rockets
        for (let r=0; r<3; r++) {
          const target = placedGuns[Math.floor(Math.random()*placedGuns.length)];
          const ang = Math.atan2((target.fy-e.fy)*mapNatH,(target.fx-e.fx)*mapNatW);
          // Slight spread between rockets
          const spread = (r-1) * 0.08;
          const ba = ang + spread;
          const spd = 1.6;
          bossRocketShots.push({
            fx:e.fx, fy:e.fy,
            dfx: spd*Math.cos(ba)/mapNatW,
            dfy: spd*Math.sin(ba)/mapNatH,
            targetFx:target.fx, targetFy:target.fy,
            dmg:def.bossRocketDmg, splash:def.bossRocketSplash,
            dead:false, trail:[], age:0,
          });
        }
        addFx(e.fx, e.fy, '#ff6010', 12);
      }
    }

    if (pos.done) {
      e.dead=true; fobHP=Math.max(0,fobHP-e.damage);
      addFx(e.fx,e.fy,'#ff3010',22); updateHUD();
      if (fobHP<=0) { endGame(false); return; }
    }

    // ── TURRET RETURN FIRE (T-72, T-80, BMP, BTR) ──
    if (e.canReturnFire && placedGuns.length>0) {
      const def = ENEMY_DEFS[e.type];
      const diagPx = Math.hypot(mapNatW,mapNatH);
      const rangeNat = def.retFireRange * diagPx;

      // Find nearest gun in range
      let nearestGun=null, nearestDist=Infinity;
      for (const g of placedGuns) {
        const d=Math.hypot((g.fx-e.fx)*mapNatW,(g.fy-e.fy)*mapNatH);
        if (d<rangeNat && d<nearestDist) { nearestGun=g; nearestDist=d; }
      }

      if (nearestGun) {
        // Smoothly rotate turret toward target (5° per frame max)
        const targetAng = Math.atan2((nearestGun.fy-e.fy)*mapNatH,(nearestGun.fx-e.fx)*mapNatW);
        let diff = targetAng - e.turretAngle;
        while (diff >  Math.PI) diff -= Math.PI*2;
        while (diff < -Math.PI) diff += Math.PI*2;
        const rotSpd = Math.PI/36; // 5° per frame
        e.turretAngle += Math.max(-rotSpd, Math.min(rotSpd, diff));

        // Fire when aimed close enough and timer ready
        e.retFireTimer--;
        const aimErr = Math.abs(diff);
        if (e.retFireTimer<=0 && aimErr<Math.PI/6) {
          e.retFireTimer = def.retFireRate;
          // Apply spread — random offset within ±retFireSpread, weighted toward centre
          const spread = def.retFireSpread || 0;
          const jitter = (Math.random() - 0.5) * 2 * spread;   // uniform across cone
          const shotAng = e.turretAngle + jitter;
          const cos=Math.cos(shotAng), sin=Math.sin(shotAng);
          cfShots.push({
            fx:e.fx, fy:e.fy,
            dfx:2.8*cos/mapNatW, dfy:2.8*sin/mapNatH,
            targetGun:nearestGun, dead:false, trail:[],
            dmg: def.retFireDmg||1,
          });
          addFx(e.fx, e.fy, '#ff8020', 6);
        }
      } else {
        // No target — slowly return turret toward body direction
        let diff = e.angle - e.turretAngle;
        while (diff >  Math.PI) diff -= Math.PI*2;
        while (diff < -Math.PI) diff += Math.PI*2;
        e.turretAngle += diff * 0.05;
      }
    }
  }

  // Guns fire at enemies
  for (const gun of placedGuns) {
    if (gun.reloadTimer>0) { gun.reloadTimer--; }
    if (gun.recoilTimer>0) gun.recoilTimer--;
    if (gun.flashTimer>0)  gun.flashTimer--;
    if (gun.reloadTimer>0) continue;
    // Crew check — silent if no crew alive
    if (effectiveRof(gun) === Infinity) continue;
    let best=null, bDist=Infinity;
    for (const e of enemies) {
      if (e.dead) continue;
      const d=Math.hypot((e.fx-gun.fx)*mapNatW,(e.fy-gun.fy)*mapNatH);
      if (d<gun.rangePx&&d<bDist) { best=e; bDist=d; }
    }
    if (!best) continue;
    gun.angle=Math.atan2((best.fy-gun.fy)*mapNatH,(best.fx-gun.fx)*mapNatW);
    gun.reloadTimer = effectiveRof(gun);
    gun.flashTimer=FLASH_FRAMES;
    addFx(gun.fx,gun.fy,gun.shell,7);
    const cos=Math.cos(gun.angle),sin=Math.sin(gun.angle);
    const def=GUN_DEFS[gun.gunKey];
    if (def.isRocket) {
      // No recoil for rocket launchers — static firing platform
      // Speed profile: cannon-speed for first 25% of distance, then ramp to 1.5× max
      const distToTarget = Math.hypot((best.fx-gun.fx)*mapNatW,(best.fy-gun.fy)*mapNatH);
      const boostDist    = distToTarget * 0.25;   // start accelerating after 25% distance
      const baseSpd      = gun.projSpd;            // same as cannon shells initially
      const maxSpd       = gun.projSpd * 1.5;      // cap at 50% faster than cannons
      projectiles.push({
        fx:gun.fx, fy:gun.fy,
        // store origin for distance tracking
        originFx:gun.fx, originFy:gun.fy,
        dfx:baseSpd*cos/mapNatW, dfy:baseSpd*sin/mapNatH,
        boostDistNat: boostDist,      // nat-px threshold before accel begins
        baseSpd, maxSpd,
        accelDir:{cos,sin},
        damage:gun.damage, color:gun.shell,
        rocket:true, dead:false, trail:[],
        age:0, sourceGun:gun,
      });
      // Back-blast particles
      for (let b=0;b<12;b++) {
        const spread=(Math.random()-0.5)*1.4;
        const bcos=Math.cos(gun.angle+Math.PI+spread);
        const bsin=Math.sin(gun.angle+Math.PI+spread);
        const bspd=1.0+Math.random()*2.2;
        backblasts.push({
          fx:gun.fx, fy:gun.fy,
          dfx:bspd*bcos/mapNatW, dfy:bspd*bsin/mapNatH,
          life:16+Math.floor(Math.random()*12), maxLife:28,
          size:1.8+Math.random()*2.8,
        });
      }
    } else {
      gun.recoilTimer=RECOIL_FRAMES;
      projectiles.push({
        fx:gun.fx, fy:gun.fy,
        dfx:gun.projSpd*cos/mapNatW, dfy:gun.projSpd*sin/mapNatH,
        damage:gun.damage, color:gun.shell,
        rocket:false, dead:false, trail:[], sourceGun:gun,
      });
    }
  }

  // Move friendly projectiles
  for (const p of projectiles) {
    if (p.dead) continue;
    p.trail.push({fx:p.fx,fy:p.fy});
    if (p.rocket) {
      if (p.trail.length>20) p.trail.shift();
      p.age++;
      // Only accelerate after travelling 25% of original target distance
      const travelledNat = Math.hypot((p.fx-p.originFx)*mapNatW,(p.fy-p.originFy)*mapNatH);
      if (travelledNat > p.boostDistNat) {
        const curSpd = Math.hypot(p.dfx*mapNatW, p.dfy*mapNatH);
        if (curSpd < p.maxSpd) {
          // Gentle linear ramp — reach max over roughly 60 frames after boost begins
          const accelAmt = (p.maxSpd - p.baseSpd) / 60;
          p.dfx += accelAmt * p.accelDir.cos / mapNatW;
          p.dfy += accelAmt * p.accelDir.sin / mapNatH;
          // Clamp to maxSpd
          const newSpd = Math.hypot(p.dfx*mapNatW, p.dfy*mapNatH);
          if (newSpd > p.maxSpd) {
            const scale = p.maxSpd / newSpd;
            p.dfx *= scale; p.dfy *= scale;
          }
        }
      }
    } else {
      if (p.trail.length > (p.isMG ? 3 : 7)) p.trail.shift();
    }
    p.fx+=p.dfx; p.fy+=p.dfy;
    for (const e of enemies) {
      if (e.dead) continue;
      const dNat=Math.hypot((e.fx-p.fx)*mapNatW,(e.fy-p.fy)*mapNatH);
      if (dNat < e.sizeFrac*Math.min(mapNatW,mapNatH)*.85+3) {
        const dmg=p.damage*(1-e.armor);
        e.hp-=dmg; e.hitFlash=8; p.dead=true;
        addFx(p.fx,p.fy,p.color,12);
        if (e.hp<=0) {
          e.dead=true; kills++; supply+=e.reward;
          addFx(e.fx,e.fy,'#ffcc40',20); updateHUD();
          // Credit kill to source gun for rank system
          if (p.sourceGun) { p.sourceGun.gunKills++; checkRankUp(p.sourceGun); }
        }
        break;
      }
    }
    if (p.fx<-.05||p.fx>1.05||p.fy<-.05||p.fy>1.05) p.dead=true;
  }

  // Move counterfire shots
  for (const p of cfShots) {
    if (p.dead) continue;
    p.trail.push({fx:p.fx,fy:p.fy}); if(p.trail.length>6)p.trail.shift();
    p.fx+=p.dfx; p.fy+=p.dfy;
    if (p.targetGun) {
      const g=p.targetGun;
      const d=Math.hypot((g.fx-p.fx)*mapNatW,(g.fy-p.fy)*mapNatH);
      if (d<14) {
        p.dead=true;
        const digReduce = g.digLevel > 0 ? DIG_STAGES[g.digLevel-1].dmgReduction : 0;
        g.hp = Math.max(0, g.hp - Math.round((p.dmg||1) * (1-digReduce)));
        addFx(p.fx,p.fy,'#ff8020',15);

        // Crew casualty — base 40%, reduced by fortification + combat medics upgrade
        const digCrewProt  = g.digLevel > 0 ? DIG_STAGES[g.digLevel-1].crewProt : 0;
        const casualtyChance = 0.40 * (1-digCrewProt) * (activeUpgrades.includes('combat_medics') ? 0.5 : 1);
        if (g.crew && g.crew.length>0 && Math.random()<casualtyChance) {
          // Pick a random living crew member
          const alive = g.crew.filter(c=>c.status!=='dead');
          if (alive.length>0) {
            const victim = alive[Math.floor(Math.random()*alive.length)];
            if (victim.status==='ok') {
              victim.status='wounded';   // first hit wounds
            } else {
              victim.status='dead';      // second hit to wounded = KIA
            }
          }
        }

        if (g.hp<=0) {
          supply+=30;
          const sIdx=placedGuns.indexOf(g);
          if (sIdx>-1) placedGuns.splice(sIdx,1);
          const slot=gunSlots[g.slotIdx];
          if (slot) { slot.occupied=false; slot.gun=null; }
          addFx(g.fx,g.fy,'#ff4010',30);
        }
      }
      // Near-miss: shot has passed the gun's closest point — fizzle with dirt puff
      const toGunX=(g.fx-p.fx)*mapNatW, toGunY=(g.fy-p.fy)*mapNatH;
      const dotForward=toGunX*p.dfx*mapNatW+toGunY*p.dfy*mapNatH;
      if (dotForward<0 && d<60) {
        p.dead=true;
        addFx(p.fx,p.fy,'#c0a060',10); // dirt puff near-miss
      }
    }
    if (p.fx<-.05||p.fx>1.05||p.fy<-.05||p.fy>1.05) p.dead=true;
  }

  // MG Guard — crewed guns with a living mg_guard crew member
  const MG_RANGE_FRAC = 0.09;   // fraction of map diagonal
  const MG_ROF        = 45;     // frames between bursts
  const MG_DAMAGE     = 8;
  const diagPx = Math.hypot(mapNatW, mapNatH);
  for (const gun of placedGuns) {
    const def = GUN_DEFS[gun.gunKey];
    if (!def.crewMax) continue;
    const positions = CREW_POSITIONS[gun.gunKey];
    if (!positions) continue;
    // Find the mg_guard crew member index
    const mgIdx = positions.findIndex(p => p.role === 'mg_guard');
    if (mgIdx < 0 || !gun.crew[mgIdx] || gun.crew[mgIdx].status === 'dead') continue;

    const mgRangePx = MG_RANGE_FRAC * diagPx;

    // Find nearest enemy in MG range
    let mgBest = null, mgBestDist = Infinity;
    for (const e of enemies) {
      if (e.dead) continue;
      const d = Math.hypot((e.fx - gun.fx)*mapNatW, (e.fy - gun.fy)*mapNatH);
      if (d < mgRangePx && d < mgBestDist) { mgBest = e; mgBestDist = d; }
    }
    gun.mgTarget = mgBest;

    if (mgBest) {
      // Smoothly rotate MG toward target
      const targetAng = Math.atan2((mgBest.fy - gun.fy)*mapNatH, (mgBest.fx - gun.fx)*mapNatW);
      let diff = targetAng - gun.mgAngle;
      while (diff >  Math.PI) diff -= Math.PI*2;
      while (diff < -Math.PI) diff += Math.PI*2;
      gun.mgAngle += Math.max(-Math.PI/12, Math.min(Math.PI/12, diff)); // 15°/frame max

      // Fire when aimed within 20° and timer ready
      gun.mgTimer--;
      if (gun.mgTimer <= 0 && Math.abs(diff) < Math.PI/9) {
        gun.mgTimer = MG_ROF;

        // Compute mg_guard world position (matches drawCrew logic)
        const mgPos = positions[mgIdx];
        const sz = def.iconSz;
        const totalRot = gun.angle + def.rotOffset;
        const crewFx = gun.fx + (mgPos.ox * sz * Math.cos(totalRot) - mgPos.oy * sz * Math.sin(totalRot)) / mapNatW;
        const crewFy = gun.fy + (mgPos.ox * sz * Math.sin(totalRot) + mgPos.oy * sz * Math.cos(totalRot)) / mapNatH;

        // 3-round burst from guard's position
        for (let b = 0; b < 3; b++) {
          const jitter = (Math.random() - 0.5) * 0.08;
          const ba = gun.mgAngle + jitter;
          const spd = 4.5 + Math.random() * 1.5;
          projectiles.push({
            fx: crewFx, fy: crewFy,
            dfx: spd * Math.cos(ba) / mapNatW,
            dfy: spd * Math.sin(ba) / mapNatH,
            damage: MG_DAMAGE, color: '#e0d060',
            rocket: false, dead: false, trail: [],
            isMG: true,
          });
        }
        addFx(crewFx, crewFy, '#ffe080', 4);
      }
    }
  }
  enemies     = enemies.filter(e=>!e.dead);
  projectiles = projectiles.filter(p=>!p.dead);
  cfShots     = cfShots.filter(p=>!p.dead);

  // Move boss rockets
  for (const r of bossRocketShots) {
    if (r.dead) continue;
    r.trail.push({fx:r.fx,fy:r.fy}); if(r.trail.length>14)r.trail.shift();
    r.fx+=r.dfx; r.fy+=r.dfy; r.age++;
    // Detonate when close to target point OR after max travel
    const dToTarget = Math.hypot((r.targetFx-r.fx)*mapNatW,(r.targetFy-r.fy)*mapNatH);
    if (dToTarget < 12 || r.age > 500) {
      r.dead=true;
      // Massive splash — damage all guns in radius
      for (const gun of placedGuns) {
        const d = Math.hypot((gun.fx-r.fx)*mapNatW,(gun.fy-r.fy)*mapNatH);
        if (d < r.splash) {
          const falloff   = 1-(d/r.splash)*0.5;
          const digReduce = gun.digLevel > 0 ? DIG_STAGES[gun.digLevel-1].dmgReduction : 0;
          gun.hp = Math.max(0, gun.hp - Math.round(r.dmg * falloff * (1-digReduce)));
          // Crew casualty from blast — dig fortification protects crew
          const digCrewProt = gun.digLevel > 0 ? DIG_STAGES[gun.digLevel-1].crewProt : 0;
          const blastCrewChance = 0.60 * (1-digCrewProt);
          if (gun.crew && Math.random()<blastCrewChance) {
            const alive=gun.crew.filter(c=>c.status!=='dead');
            if (alive.length>0) {
              const v=alive[Math.floor(Math.random()*alive.length)];
              v.status = v.status==='ok' ? 'wounded' : 'dead';
            }
          }
          if (gun.hp<=0) {
            supply+=30;
            const sIdx=placedGuns.indexOf(gun);
            if (sIdx>-1) placedGuns.splice(sIdx,1);
            const slot=gunSlots[gun.slotIdx];
            if (slot){slot.occupied=false;slot.gun=null;}
            addFx(gun.fx,gun.fy,'#ff4010',35);
          }
        }
      }
      // Explosion effects
      for (let i=0;i<12;i++) {
        const a=Math.random()*Math.PI*2, d=Math.random()*r.splash*0.8;
        effects.push({fx:r.fx+Math.cos(a)*d/mapNatW, fy:r.fy+Math.sin(a)*d/mapNatH,
                      color:i%2===0?'#ff6010':'#ff2000', life:30, maxLife:30});
      }
    }
    if (r.fx<-.05||r.fx>1.05||r.fy<-.05||r.fy>1.05) r.dead=true;
  }
  bossRocketShots = bossRocketShots.filter(r=>!r.dead);
  for (const b of backblasts) { b.fx+=b.dfx; b.fy+=b.dfy; b.life--; }
  backblasts  = backblasts.filter(b=>b.life>0);
  for (const ef of effects) ef.life--;
  effects = effects.filter(ef=>ef.life>0);
  updateFireMission();

  if (waveSpawnDone&&enemies.length===0) {
    waveActive=false; waveSpawnDone=false;
    // Supply reward — boosted by ammo_resupply upgrade
    const supplyBonus = Math.round((60+waveInGroup*15) * (activeUpgrades.includes('ammo_resupply')?1.25:1));
    supply += supplyBonus;
    updateHUD();

    // Fire mission target landing
    if (fireMissionPending) {
      fireMissionPending.timer--;
      // handled separately in update loop
    }

    if (isBossWave()) {
      // ── GROUP COMPLETE ──
      handleGroupComplete();
    } else {
      waveInGroup++;
      updateHUD(); refreshCodex();
      const btn=document.getElementById('btn-start');
      btn.textContent=`▶ START ${waveLabel()}`;
      btn.classList.remove('hidden');
    }
  }
}

// ═══════════════════════════════════════════════════
// GROUP COMPLETION + UPGRADES + FIRE MISSION
// ═══════════════════════════════════════════════════
function handleGroupComplete() {
  const completed = groupNum;
  groupNum++;
  waveInGroup = 1;

  // Weapon unlock
  const unlock = GROUP_UNLOCKS[completed];
  if (unlock) unlockedGuns.add(unlock);

  // Fire mission tokens (group 2+, double from group 5+)
  if (completed >= 1) fireMissionTokens += (completed >= 4 ? 2 : 1);
  updateFireMissionBtn();

  // Draw 3 random upgrades from pool
  const pool = shuffleArray(Object.keys(UPGRADE_DEFS)).slice(0, 3);

  // Supply bonus
  const bonusSupply = 150 + completed * 50;
  supply += bonusSupply;
  updateHUD();

  showGroupComplete(completed, unlock, pool, bonusSupply);
}

function showGroupComplete(completedGroup, unlock, upgrades, bonusSupply) {
  const el = document.getElementById('group-complete');

  document.getElementById('gc-title').textContent  = `GROUP ${completedGroup} — SECURED`;
  document.getElementById('gc-group').textContent  = `ADVANCING TO GROUP ${groupNum}`;
  document.getElementById('gc-supply').textContent = `+$${bonusSupply} SUPPLY`;

  // Unlock badge
  const unlockEl = document.getElementById('gc-unlock');
  if (unlock) {
    const def = GUN_DEFS[unlock];
    unlockEl.innerHTML = `
      <div class="gc-unlock-badge">
        <img src="${def.menuSrc}" alt="${def.label}" style="height:44px;object-fit:contain;">
        <div class="gc-unlock-label">UNLOCKED: ${def.label}</div>
      </div>`;
    unlockEl.style.display='block';
  } else {
    unlockEl.innerHTML = `<div class="gc-unlock-badge"><div class="gc-unlock-label">⊛ +${fireMissionTokens} FIRE MISSION TOKEN${fireMissionTokens!==1?'S':''}</div></div>`;
    unlockEl.style.display='block';
  }

  // Upgrade cards
  const cardsEl = document.getElementById('gc-cards');
  cardsEl.innerHTML='';
  for (const key of upgrades) {
    const def = UPGRADE_DEFS[key];
    const card = document.createElement('div');
    card.className = 'upgrade-card';
    card.style.borderColor = def.color + '88';
    card.innerHTML = `
      <div class="uc-icon" style="color:${def.color}">${def.icon}</div>
      <div class="uc-name">${def.name}</div>
      <div class="uc-desc">${def.desc}</div>`;
    card.addEventListener('pointerup', e=>{
      e.stopPropagation();
      pickUpgrade(key);
    });
    cardsEl.appendChild(card);
  }

  el.style.display='flex';
}

function pickUpgrade(key) {
  activeUpgrades.push(key);
  // Apply to all existing guns
  for (const g of placedGuns) recalcGunStats(g);

  document.getElementById('group-complete').style.display='none';

  // Show start button for next group
  const btn = document.getElementById('btn-start');
  btn.textContent = `▶ START ${waveLabel()}`;
  btn.classList.remove('hidden');
  refreshCodex();
}

// ── FIRE MISSION ──
function toggleRouteEdit() {
  routeEditMode = !routeEditMode;
  document.getElementById('btn-route-edit').classList.toggle('active', routeEditMode);
}

let coordToastTimer = null;
function showCoordToast(fx, fy) {
  const toast = document.getElementById('coord-toast');
  toast.textContent = `[${fx.toFixed(3)}, ${fy.toFixed(3)}]  — tap to copy`;
  toast.classList.add('show');
  clearTimeout(coordToastTimer);
  coordToastTimer = setTimeout(()=>toast.classList.remove('show'), 2500);
  // Copy to clipboard
  try { navigator.clipboard.writeText(`[${fx.toFixed(3)}, ${fy.toFixed(3)}]`); } catch(e){}
}

function toggleFireMission() {
  if (fireMissionTokens <= 0) return;
  fireMissionArmed = !fireMissionArmed;
  document.body.classList.toggle('fm-armed', fireMissionArmed);
  updateFireMissionBtn();
  document.getElementById('fire-mission-hint').style.display = fireMissionArmed ? 'block' : 'none';
}

function updateFireMissionBtn() {
  const btn = document.getElementById('btn-fire-mission');
  if (!btn) return;
  btn.textContent    = `☢ FIRE MISSION (${fireMissionTokens})`;
  btn.style.opacity  = fireMissionTokens > 0 ? '1' : '0.35';
  btn.style.pointerEvents = fireMissionTokens > 0 ? 'auto' : 'none';
  btn.classList.toggle('active', fireMissionArmed);
}

function launchFireMission(fx, fy) {
  fireMissionTokens--;
  fireMissionArmed = false;
  document.body.classList.remove('fm-armed');
  updateFireMissionBtn();
  document.getElementById('fire-mission-hint').style.display='none';
  fireMissionPending = { fx, fy, timer: 180 };
}

function updateFireMission() {
  if (!fireMissionPending) return;
  fireMissionPending.timer--;
  if (fireMissionPending.timer <= 0) {
    detonateFireMission(fireMissionPending.fx, fireMissionPending.fy);
    fireMissionPending = null;
  }
}

function detonateFireMission(fx, fy) {
  const diagPx = Math.hypot(mapNatW, mapNatH);
  const radius = diagPx * 0.08;   // 8% of map diagonal

  // Damage all enemies in radius — heavy
  for (const e of enemies) {
    if (e.dead) continue;
    const d = Math.hypot((e.fx-fx)*mapNatW, (e.fy-fy)*mapNatH);
    if (d < radius) {
      const falloff = 1 - (d/radius)*0.6;
      e.hp -= Math.round(600 * falloff);
      e.hitFlash = 12;
      if (e.hp <= 0) { e.dead=true; kills++; supply+=e.reward; updateHUD(); }
    }
  }
  // Explosion effects — scattered across the impact zone
  for (let i=0;i<20;i++) {
    const angle = Math.random()*Math.PI*2;
    const dist  = Math.random()*radius;
    const efx   = fx + Math.cos(angle)*dist/mapNatW;
    const efy   = fy + Math.sin(angle)*dist/mapNatH;
    effects.push({ fx:efx, fy:efy, color:i%3===0?'#ffffff':i%3===1?'#ff8020':'#ff3010',
                   life: 25+Math.floor(Math.random()*20), maxLife:45 });
  }
}

function drawFireMission() {
  // Draw pending strike reticle
  if (fireMissionPending) {
    const [x,y] = np(fireMissionPending.fx, fireMissionPending.fy);
    const frac  = 1 - fireMissionPending.timer/180;
    const r     = Math.hypot(mapNatW,mapNatH)*0.08;
    // Pulsing outer ring
    ctx.strokeStyle = `rgba(255,60,20,${0.4+Math.sin(frac*Math.PI*8)*0.3})`;
    ctx.lineWidth   = lw(2.5);
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.stroke();
    // Crosshair
    ctx.strokeStyle='rgba(255,80,20,0.7)'; ctx.lineWidth=lw(1.5);
    const ch=r*0.35;
    ctx.beginPath(); ctx.moveTo(x-ch,y); ctx.lineTo(x+ch,y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x,y-ch); ctx.lineTo(x,y+ch); ctx.stroke();
    // Countdown text
    const secs = Math.ceil(fireMissionPending.timer/60);
    ctx.fillStyle='rgba(255,100,30,0.9)';
    ctx.font=`bold ${Math.max(8,rs(14))}px Courier New`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(`INBOUND ${secs}s`, x, y-r*0.5);
  }
  // Armed targeting crosshair at map centre (just a hint)
  if (fireMissionArmed) {
    // Handled by CSS cursor change — no canvas draw needed
  }
}
