<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>FIREBASE — Camera Tool</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a1a1a; color:#c8a040; font-family:'Courier New',monospace; overflow:hidden; }
#c { display:block; width:100vw; height:100vh; }
#hud {
  position:fixed; top:0; left:0; right:0;
  background:rgba(0,0,0,0.85); padding:8px 12px;
  display:flex; flex-wrap:wrap; gap:6px; align-items:center;
  border-bottom:1px solid #4a3418; z-index:10;
  font-size:11px;
}
#coords {
  position:fixed; bottom:0; left:0; right:0;
  background:rgba(0,0,0,0.9); padding:10px 12px;
  border-top:1px solid #4a3418; z-index:10;
  font-size:12px; letter-spacing:.05em;
}
#coords .val { color:#ff9030; font-weight:bold; }
.ctrl { display:flex; flex-direction:column; align-items:center; gap:2px; }
.ctrl label { font-size:9px; color:#7a5830; letter-spacing:.1em; }
.ctrl input[type=range] { width:80px; accent-color:#c8a040; }
.btn {
  background:#1e1a10; border:1px solid #4a3418; color:#c8a040;
  font-family:'Courier New',monospace; font-size:10px;
  padding:4px 8px; cursor:pointer; letter-spacing:.1em;
}
.btn:active { background:#2e2a20; }
#copyBtn { background:#3a1008; border-color:#8a2010; color:#ff6040; }
#status { font-size:10px; color:#7a5830; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud">
  <div class="ctrl">
    <label>CAM X (left/right)</label>
    <input type="range" id="cx" min="-0.05" max="0.05" step="0.001" value="0">
  </div>
  <div class="ctrl">
    <label>CAM Y (up/down)</label>
    <input type="range" id="cy" min="-0.02" max="0.05" step="0.001" value="0.01">
  </div>
  <div class="ctrl">
    <label>CAM Z (fwd/back)</label>
    <input type="range" id="cz" min="-0.08" max="0.08" step="0.001" value="0.04">
  </div>
  <div class="ctrl">
    <label>YAW (left/right aim)</label>
    <input type="range" id="yaw" min="-3.14" max="3.14" step="0.01" value="0">
  </div>
  <div class="ctrl">
    <label>PITCH (up/down aim)</label>
    <input type="range" id="pitch" min="-1.5" max="1.5" step="0.01" value="0">
  </div>
  <div class="ctrl">
    <label>FOV</label>
    <input type="range" id="fov" min="20" max="100" step="1" value="60">
  </div>
  <button class="btn" onclick="resetCam()">RESET</button>
  <button class="btn" id="copyBtn" onclick="copyVals()">📋 COPY VALUES</button>
  <span id="status">Loading M119.glb...</span>
</div>

<div id="coords">
  <span>CAM POS: x=<span class="val" id="vx">0</span>  y=<span class="val" id="vy">0</span>  z=<span class="val" id="vz">0</span></span>
  &nbsp;&nbsp;&nbsp;
  <span>AIM: yaw=<span class="val" id="vyaw">0</span>  pitch=<span class="val" id="vpitch">0</span>  fov=<span class="val" id="vfov">60</span></span>
  &nbsp;&nbsp;&nbsp;
  <span style="color:#60a080">← Drag canvas to orbit view | Sliders adjust camera position</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── Setup ──
const canvas = document.getElementById('c');
const W = window.innerWidth, H = window.innerHeight;
canvas.width = W; canvas.height = H;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x2a3040);

const camera = new THREE.PerspectiveCamera(60, W/H, 0.0001, 100);
camera.position.set(0, 0.01, 0.04);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 1.5));
const sun = new THREE.DirectionalLight(0xfff0d8, 0.8);
sun.position.set(1, 2, 1); scene.add(sun);
const sun2 = new THREE.DirectionalLight(0x8090ff, 0.3);
sun2.position.set(-1, 0.5, -1); scene.add(sun2);

// Ground grid
const grid = new THREE.GridHelper(0.2, 20, 0x405040, 0x304030);
scene.add(grid);

// Axis helper — shows X(red) Y(green) Z(blue) at model origin
const axes = new THREE.AxesHelper(0.015);
scene.add(axes);

// Axis labels (small colored spheres so readable on mobile)
const axDots = [
  { pos:[0.015,0,0], col:0xff4040, label:'X+' },
  { pos:[0,0.015,0], col:0x40ff40, label:'Y+' },
  { pos:[0,0,0.015], col:0x4040ff, label:'Z+' },
];
axDots.forEach(d => {
  const m = new THREE.Mesh(new THREE.SphereGeometry(0.001,8,8),
    new THREE.MeshBasicMaterial({color:d.col}));
  m.position.set(...d.pos); scene.add(m);
});

// ── GLB Loader (inline) ──
THREE.GLTFLoader = class {
  load(url, onLoad, _, onError) {
    fetch(url)
      .then(r => { if (!r.ok) throw new Error(r.status); return r.arrayBuffer(); })
      .then(buf => {
        const view = new DataView(buf);
        if (view.getUint32(0,true) !== 0x46546C67) throw new Error('Not GLB');
        const jsonLen = view.getUint32(12, true);
        const jsonStr = new TextDecoder().decode(new Uint8Array(buf, 20, jsonLen));
        const json = JSON.parse(jsonStr);
        const jsonEnd = 20 + jsonLen;
        const bin = view.byteLength > jsonEnd+8
          ? buf.slice(jsonEnd+8, jsonEnd+8+view.getUint32(jsonEnd,true))
          : new ArrayBuffer(0);
        this._build(json, bin, onLoad);
      })
      .catch(e => { if (onError) onError(e); document.getElementById('status').textContent='❌ '+e.message; });
  }
  _build(json, bin, onLoad) {
    const bufs = [bin];
    const views = (json.bufferViews||[]).map(bv =>
      new Uint8Array(bufs[bv.buffer||0], bv.byteOffset||0, bv.byteLength));
    const imgs = (json.images||[]).map(img => {
      if (img.bufferView===undefined) return null;
      const blob = new Blob([views[img.bufferView]], {type:img.mimeType||'image/png'});
      const tex = new THREE.Texture();
      const im = new Image();
      im.onload = () => { tex.image=im; tex.needsUpdate=true; URL.revokeObjectURL(im.src); };
      im.src = URL.createObjectURL(blob);
      return tex;
    });
    const mats = (json.materials||[]).map(m => {
      const mat = new THREE.MeshLambertMaterial();
      const pbr = m.pbrMetallicRoughness;
      if (pbr) {
        if (pbr.baseColorFactor) mat.color.setRGB(...pbr.baseColorFactor.slice(0,3));
        if (pbr.baseColorTexture!=null && imgs[pbr.baseColorTexture.index])
          mat.map = imgs[pbr.baseColorTexture.index];
      }
      return mat;
    });
    const acc = json.accessors||[];
    const getA = i => {
      const a=acc[i], bv=(json.bufferViews||[])[a.bufferView];
      const off=(bv.byteOffset||0)+(a.byteOffset||0);
      const T={SCALAR:1,VEC2:2,VEC3:3,VEC4:4,MAT4:16};
      const CT={5120:Int8Array,5121:Uint8Array,5122:Int16Array,5123:Uint16Array,5125:Uint32Array,5126:Float32Array};
      return new (CT[a.componentType])(bufs[bv.buffer||0],off,a.count*T[a.type]);
    };
    const group = new THREE.Group();
    (json.meshes||[]).forEach(mesh => {
      mesh.primitives.forEach(prim => {
        const g = new THREE.BufferGeometry();
        if (prim.attributes.POSITION!=null) g.setAttribute('position',new THREE.BufferAttribute(new Float32Array(getA(prim.attributes.POSITION)),3));
        if (prim.attributes.NORMAL!=null) g.setAttribute('normal',new THREE.BufferAttribute(new Float32Array(getA(prim.attributes.NORMAL)),3));
        if (prim.attributes.TEXCOORD_0!=null) g.setAttribute('uv',new THREE.BufferAttribute(new Float32Array(getA(prim.attributes.TEXCOORD_0)),2));
        if (prim.indices!=null){const id=getA(prim.indices);g.setIndex(new THREE.BufferAttribute(id instanceof Uint32Array?id:new Uint32Array(id),1));}
        if (!g.attributes.normal) g.computeVertexNormals();
        const mat = mats[prim.material]||new THREE.MeshLambertMaterial({color:0x4a6040});
        group.add(new THREE.Mesh(g,mat));
      });
    });
    onLoad({scene:group});
  }
};

// Load M119.glb
let model = null;
new THREE.GLTFLoader().load('assets/M119.glb', gltf => {
  model = gltf.scene;
  // Normalize to ~8m
  const box = new THREE.Box3().setFromObject(model);
  const sz = new THREE.Vector3(); box.getSize(sz);
  const maxDim = Math.max(sz.x,sz.y,sz.z);
  if (maxDim>0) model.scale.setScalar(0.008/maxDim);
  // Ground it
  const box2 = new THREE.Box3().setFromObject(model);
  model.position.y -= box2.min.y;
  scene.add(model);
  document.getElementById('status').textContent = `✓ M119.glb loaded (${sz.x.toFixed(1)}×${sz.y.toFixed(1)}×${sz.z.toFixed(1)} orig units)`;
}, undefined, e => {
  document.getElementById('status').textContent = '❌ Could not load M119.glb — make sure this file is served from same folder as assets/';
});

// ── Sliders → camera ──
const ids = ['cx','cy','cz','yaw','pitch','fov'];
ids.forEach(id => document.getElementById(id).addEventListener('input', updateCam));

function updateCam() {
  const cx = +document.getElementById('cx').value;
  const cy = +document.getElementById('cy').value;
  const cz = +document.getElementById('cz').value;
  const yaw = +document.getElementById('yaw').value;
  const pitch = +document.getElementById('pitch').value;
  const fov = +document.getElementById('fov').value;

  camera.position.set(cx, cy, cz);
  camera.fov = fov;
  camera.updateProjectionMatrix();

  // LookAt target along yaw+pitch from camera position
  const tx = cx + Math.sin(yaw)*Math.cos(pitch)*5;
  const ty = cy + Math.sin(pitch)*5;
  const tz = cz + Math.cos(yaw)*Math.cos(pitch)*5;
  camera.lookAt(tx, ty, tz);

  // Update readout
  document.getElementById('vx').textContent = cx.toFixed(4);
  document.getElementById('vy').textContent = cy.toFixed(4);
  document.getElementById('vz').textContent = cz.toFixed(4);
  document.getElementById('vyaw').textContent = yaw.toFixed(3);
  document.getElementById('vpitch').textContent = pitch.toFixed(3);
  document.getElementById('vfov').textContent = fov;
}

function resetCam() {
  document.getElementById('cx').value = 0;
  document.getElementById('cy').value = 0.01;
  document.getElementById('cz').value = 0.04;
  document.getElementById('yaw').value = 0;
  document.getElementById('pitch').value = 0;
  document.getElementById('fov').value = 60;
  updateCam();
}

function copyVals() {
  const cx = document.getElementById('cx').value;
  const cy = document.getElementById('cy').value;
  const cz = document.getElementById('cz').value;
  const yaw = document.getElementById('yaw').value;
  const pitch = document.getElementById('pitch').value;
  const fov = document.getElementById('fov').value;
  const txt = `cx:${cx} cy:${cy} cz:${cz} yaw:${yaw} pitch:${pitch} fov:${fov}`;
  navigator.clipboard.writeText(txt).then(() => {
    document.getElementById('status').textContent = '✓ Copied: ' + txt;
  });
}

updateCam();

// ── Render loop ──
function loop() {
  requestAnimationFrame(loop);
  renderer.render(scene, camera);
}
loop();
</script>
</body>
</html>
